                  <span className="text-red-600 text-sm shrink-0">🚫</span>
                  <p className="text-red-800 font-semibold">Never connect Tableau (or any reporting tool) to production BigQuery using a personal Google/GCP account. Personal accounts are not approved for production and connections will break when your session expires or your account changes.</p>

                <div className="flex items-start gap-2">
                  <span className="w-5 h-5 rounded-full bg-purple-700 text-white font-bold flex items-center justify-center shrink-0 text-xs">1</span>

                    <p className="font-bold">Request a Production Restricted Service Account</p>

function parseSQL(sql){
  const tables=[];
  const columns=[];
  // Capture table refs with optional alias
  const fromJoinRegex=/(?:FROM|JOIN)\s+(?:`([^`]+)`|(\[[\w.\s]+\])|([a-zA-Z_][\w]*(?:\.[a-zA-Z_][\w]*){0,2}))(?:\s+(?:AS\s+)?([a-zA-Z_]\w*))?/gi;
  let match;
  while((match=fromJoinRegex.exec(sql))!==null){
    const ref=match[1]||match[2]?.replace(/[\[\]]/g,'')||match[3];
    const tAlias=match[4];
    if(!ref)continue;
    const parts=ref.split('.');
    const t={source:ref,table:parts[parts.length-1]};
    if(tAlias&&!/^(WHERE|ON|SET|GROUP|ORDER|HAVING|LIMIT|INNER|LEFT|RIGHT|FULL|CROSS|OUTER)$/i.test(tAlias))t.tableAlias=tAlias;
    if(parts.length>=3){t.database=parts[0];t.schema=parts[1];}
    else if(parts.length===2){t.schema=parts[0];}
    if(!tables.find(x=>x.source===ref))tables.push(t);
  }
  // Mark CTEs so they aren't remapped
  const cteRegex=/WITH\s+([a-zA-Z_]\w*)\s+AS\s*\(/gi;
  const cteNames=new Set();
  while((match=cteRegex.exec(sql))!==null)cteNames.add(match[1].toLowerCase());
  tables.forEach(t=>{if(cteNames.has(t.table.toLowerCase()))t.isCTE=true;});
  const mappableTables=tables.filter(t=>!t.isCTE);
  // Extract SELECT columns (respects parentheses nesting)
  const selectMatch=sql.match(/SELECT\s+([\s\S]*?)(?:\bFROM\b)/i);
  if(selectMatch){
    const selectBody=selectMatch[1];
    const parts=[];let depth=0,cur='';
    for(const ch of selectBody){
      if(ch==='(')depth++;else if(ch===')')depth--;
      if(ch===','&&depth===0){parts.push(cur.trim());cur='';}else cur+=ch;
    }
    if(cur.trim())parts.push(cur.trim());
    for(const part of parts){
      const trimmed=part.replace(/\s+/g,' ').trim();
      if(!trimmed||trimmed==='*'||trimmed.endsWith('.*'))continue;
      const aliasMatch=trimmed.match(/(?:\bAS\s+)?([a-zA-Z_]\w*)\s*$/i);
      if(aliasMatch){
        const alias=aliasMatch[1];
        const nameMatch=trimmed.match(/([a-zA-Z_]\w*(?:\.[a-zA-Z_]\w*)?)\s+(?:AS\s+)?[a-zA-Z_]\w*\s*$/i);
        columns.push({name:nameMatch?nameMatch[1].split('.').pop():alias,alias,fullExpr:trimmed});
      }
    }
  }
  return{tables:mappableTables,columns,cteNames:[...cteNames]};
}

const ABBREV_MAP={
  mbr:'member',clm:'claim',rx:'prescription',elig:'eligibility',dx:'diagnosis',
  proc:'procedure',prov:'provider',mem:'member',amt:'amount',dt:'date',cd:'code',
  desc:'description',cnt:'count',num:'number',ind:'indicator',flg:'flag',
  typ:'type',nm:'name',addr:'address',acct:'account',dept:'department',
  div:'division',loc:'location',grp:'group',emp:'employee',qty:'quantity',
  val:'value',seq:'sequence',src:'source',tgt:'target',ref:'reference',
  stat:'status',ts:'timestamp',yr:'year',mo:'month',wk:'week',qtr:'quarter',
  edw:'enterprise_data_warehouse',dw:'data_warehouse',ods:'operational_data_store',
  stg:'staging',prd:'production',dev:'development',qa:'quality_assurance',
  svc:'service',srv:'server',usr:'user',cust:'customer',prod:'product',
  inv:'invoice',ord:'order',shp:'ship',rcv:'receive',pay:'payment',
  auth:'authorization',appr:'approval',upd:'update',ins:'insert',del:'delete',
  chg:'change',hst:'history',arch:'archive',tmp:'temp',cfg:'config',
  sys:'system',dim:'dimension',fct:'fact',rpt:'report',agg:'aggregate',
  smry:'summary',dtl:'detail',v:'view',tbl:'table',
};

function levenshtein(a,b){
  const m=a.length,n=b.length;
  if(m===0)return n;if(n===0)return m;
  const dp=[];
  for(let i=0;i<=m;i++){dp[i]=[];for(let j=0;j<=n;j++)dp[i][j]=i===0?j:j===0?i:0;}
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function nameSimilarity(a,b){
  if(!a||!b)return 0;
  const al=a.toLowerCase().replace(/[^a-z0-9]/g,'');
  const bl=b.toLowerCase().replace(/[^a-z0-9]/g,'');
  if(al===bl)return 1;
  if(!al||!bl)return 0;
  return Math.max(0,1-levenshtein(al,bl)/Math.max(al.length,bl.length,1));
}

function gcpNormalize(name){
  if(!name)return '';
  return name.toLowerCase()
    .replace(/[^a-z0-9_]/g,'_')
    .replace(/^(\d)/,'_$1')
    .replace(/_+/g,'_')
    .replace(/_+$/,'');
}

function expandAbbrevs(name){
  if(!name)return name;
  return name.toLowerCase().split(/[_\s\-]+/).map(p=>ABBREV_MAP[p]||p).join('_');
}

function scoreMapping(source,target,section){
  if(!source)return{score:0,label:'Unknown',color:'text-slate-500',bg:'bg-slate-100',bar:'#94a3b8'};
  const tgt=target||'';
  const sl=source.toLowerCase(),tl=tgt.toLowerCase();
  const bqOk=/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(tgt)?8:0;
  const notEmpty=tgt.length>0?5:0;
  if(sl===tl)return{score:100,label:'Exact match',color:'text-green-700',bg:'bg-green-100',bar:'#16a34a'};
  const norm=gcpNormalize(source);
  if(norm===tl)return{score:96,label:'Normalized',color:'text-green-700',bg:'bg-green-100',bar:'#16a34a'};
  const simRaw=nameSimilarity(source,tgt);
  const expanded=expandAbbrevs(source);
  const simExp=nameSimilarity(expanded,tgt);
  const simBoth=nameSimilarity(expanded,expandAbbrevs(tgt));
  const bestSim=Math.max(simRaw,simExp,simBoth);
  let score=Math.round(bestSim*82+bqOk+notEmpty);
  if(section==='databases'&&tgt.length>0)score=Math.max(score,58);
  if(section==='schemas'&&tgt.length>0)score=Math.max(score,62);
  score=Math.min(100,Math.max(0,score));
  if(score>=90)return{score,label:'High confidence',color:'text-green-700',bg:'bg-green-100',bar:'#16a34a'};
  if(score>=75)return{score,label:'Good match',color:'text-lime-700',bg:'bg-lime-100',bar:'#65a30d'};
  if(score>=55)return{score,label:'Fair match',color:'text-amber-700',bg:'bg-amber-100',bar:'#d97706'};
  if(score>=35)return{score,label:'Low confidence',color:'text-orange-700',bg:'bg-orange-100',bar:'#ea580c'};
  return{score,label:'Needs review',color:'text-red-700',bg:'bg-red-100',bar:'#dc2626'};
}

function computeOverallScore(mappings){
  if(!mappings)return 0;
  const scores=[
    ...mappings.databases.map(r=>scoreMapping(r.source,r.target,'databases').score),
    ...mappings.schemas.map(r=>scoreMapping(r.source,r.target,'schemas').score),
    ...mappings.tables.map(r=>scoreMapping(r.source,r.target,'tables').score),
    ...mappings.columns.map(r=>scoreMapping(r.source,r.target,'columns').score),
  ];
  if(!scores.length)return 0;
  return Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
}

function buildAutoMap(structures,gcpProject,gcpDataset){
  const uniqueDBs=[...new Set(structures.tables.map(t=>t.database).filter(Boolean))];
  const uniqueSchemas=[...new Set(structures.tables.map(t=>t.schema).filter(Boolean))];
  const uniqueTables=[...new Set(structures.tables.map(t=>t.table))];
  return{
    databases:uniqueDBs.map(db=>({source:db,target:gcpProject,auto:gcpProject,gcpWave:'unknown'})),
    schemas:uniqueSchemas.map(s=>({source:s,target:gcpDataset,auto:gcpDataset,gcpWave:'unknown'})),
    tables:uniqueTables.map(t=>{const n=gcpNormalize(t)||t;return{source:t,target:n,auto:n,gcpWave:'unknown'};}),
    columns:structures.columns.map(c=>{
      const tgt=c.alias||gcpNormalize(c.name)||c.name;
      return{source:c.name,alias:c.alias,target:tgt,auto:tgt,fullExpr:c.fullExpr,gcpWave:'unknown'};
    }),
  };
}

function applyMappings(sql,mappings,gcpProject,gcpDataset){
  let out=sql;
  const applied=[];
  for(const db of mappings.databases){
    for(const schema of mappings.schemas){
      for(const table of mappings.tables){
        const sourceRef=`${db.source}.${schema.source}.${table.source}`;
        const targetRef=`\`${db.target}.${schema.target}.${table.target}\``;
        const regex=new RegExp(sourceRef.replace(/\./g,'\\.'), 'gi');
        const before=out; out=out.replace(regex,targetRef);
        if(out!==before)applied.push(`${sourceRef} → ${targetRef}`);
      }
    }
  }
  for(const schema of mappings.schemas){
    for(const table of mappings.tables){
      const sourceRef=`${schema.source}.${table.source}`;
      const targetRef=`\`${gcpProject}.${schema.target}.${table.target}\``;
      const regex=new RegExp(`(?<!\\.)${sourceRef.replace(/\./g,'\\.')}(?!\\.)`, 'gi');
      const before=out; out=out.replace(regex,targetRef);
      if(out!==before)applied.push(`${sourceRef} → ${targetRef}`);
    }
  }
  for(const table of mappings.tables){
    const targetRef=`\`${gcpProject}.${gcpDataset}.${table.target}\``;
    const regex=new RegExp(`(FROM|JOIN)\\s+${table.source}\\b(?!\\.)`, 'gi');
    const before=out; out=out.replace(regex,`$1 ${targetRef}`);
    if(out!==before)applied.push(`${table.source} → ${targetRef}`);
  }
  return{output:out,applied};
}

function detectPlatformFromURL(url){
  const u=url.toLowerCase();
  if(u.includes('tableau'))return'teradata';
  if(u.includes('mstr')||u.includes('microstrategy'))return'microstrategy';
  if(u.includes('ssrs')||u.includes('reportserver'))return'sqlserver';
  if(u.includes('obiee')||u.includes('analytics'))return'oracle';
  return null;
}

function extractSQLFromFile(content,filename){
  const ext=filename.split('.').pop().toLowerCase();
  if(ext==='sql'||ext==='txt')return content;
  if(ext==='twb'||ext==='xml'){
    const matches=[...content.matchAll(/<(?:relation|sql|query)[^>]*type="text"[^>]*>([\s\S]*?)<\/(?:relation|sql|query)>/gi)];
    if(matches.length)return matches.map(m=>m[1].trim()).join('\n\n-- next query --\n\n');
    const textMatches=[...content.matchAll(/<text>([\s\S]*?)<\/text>/gi)];
    if(textMatches.length)return textMatches.map(m=>m[1].trim()).filter(t=>t.length>20).join('\n\n-- next query --\n\n');
  }
  return content;
}

// ─── SQL Validator / Auto-Fixer ─────────────────────────────────────
function validateAndFixSQL(sql){
  const errors=[];const fixes=[];let fixed=sql;
  const opens=(sql.match(/\(/g)||[]).length;
  const closes=(sql.match(/\)/g)||[]).length;
  if(opens!==closes)errors.push(`Unbalanced parentheses: ${opens} open vs ${closes} close — check subqueries and function calls`);
  if(/\bNVL\s*\(/i.test(fixed)){
    fixed=fixed.replace(/\bNVL\s*\(([^,]+),([^)]+)\)/gi,(_,a,b)=>`IFNULL(${a.trim()}, ${b.trim()})`);
    fixes.push('NVL → IFNULL (auto-fixed)');
  }
  if(/\bSYSDATE\b/i.test(fixed)){
    fixed=fixed.replace(/\bSYSDATE\b/gi,'CURRENT_TIMESTAMP()');
    fixes.push('SYSDATE → CURRENT_TIMESTAMP() (auto-fixed)');
  }
  if(/\bFROM\s+DUAL\b/i.test(fixed)){
    fixed=fixed.replace(/\bFROM\s+DUAL\b/gi,'');
    fixes.push('FROM DUAL removed (auto-fixed)');
  }
  if(/\bISNULL\s*\(/i.test(fixed)){
    fixed=fixed.replace(/\bISNULL\s*\(([^,]+),([^)]+)\)/gi,(_,a,b)=>`IFNULL(${a.trim()}, ${b.trim()})`);
    fixes.push('ISNULL → IFNULL (auto-fixed)');
  }
  if(/\bGETDATE\s*\(\s*\)/i.test(fixed)){
    fixed=fixed.replace(/\bGETDATE\s*\(\s*\)/gi,'CURRENT_TIMESTAMP()');
    fixes.push('GETDATE() → CURRENT_TIMESTAMP() (auto-fixed)');
  }
  if(/\bROWNUM\b/i.test(fixed)&&!/ROW_NUMBER/i.test(fixed))
    errors.push('ROWNUM detected — convert to ROW_NUMBER() OVER() in a subquery, or use LIMIT at the end');
  if(/#\w+/.test(fixed))
    errors.push('Temp table (#tablename) references — use WITH cte AS (...) or CREATE TEMP TABLE instead');
  if(/\bCONNECT\s+BY\b/i.test(fixed)&&!/recursive/i.test(fixed))
    errors.push('CONNECT BY detected — rewrite as recursive CTE: WITH RECURSIVE cte AS (...)');
  if(/\(\+\)/.test(fixed))
    errors.push('Oracle (+) outer join syntax — convert to explicit LEFT JOIN / RIGHT JOIN');
  if(/\bDECODE\s*\(/i.test(fixed))
    errors.push('DECODE() detected — convert to CASE WHEN expression');
  return{fixed,errors,fixes};
}

// ─── Report Converter Component ───────────────────────────────────
function ReportConverter({settings,toast,savedReports,setSavedReports,setPage}){
  const [step,setStep]=useState(0);
  const [platform,setPlatform]=useState('');
  const [reportURL,setReportURL]=useState('');
  const [reportName,setReportName]=useState('');
  const [gcpProject,setGcpProject]=useState(settings.gcpProject||'');
  const [gcpDataset,setGcpDataset]=useState(settings.bigqueryDataset||'');
  const [inputSQL,setInputSQL]=useState('');
  const [structures,setStructures]=useState(null);
  const [mappings,setMappings]=useState(null);
  const [convertedSQL,setConvertedSQL]=useState('');
  const [syntaxChanges,setSyntaxChanges]=useState([]);
  const [mappingChanges,setMappingChanges]=useState([]);
  const [iframeErr,setIframeErr]=useState(false);
  const [copied,setCopied]=useState(false);
  const [showPreviewModal,setShowPreviewModal]=useState(false);
  const [showSaved,setShowSaved]=useState(false);
  const [showApplyModal,setShowApplyModal]=useState(false);
  const [showSQLCompare,setShowSQLCompare]=useState(false);
  const [gcpMigVersion,setGcpMigVersion]=useState('1.5');
  const [validationErrors,setValidationErrors]=useState([]);
  const [validationFixes,setValidationFixes]=useState([]);
  const fileRef=useRef(null);

  // Pick up SQL sent from SQL Translator via sessionStorage
  useEffect(()=>{
    const pending=sessionStorage.getItem('td_pending_sql');
    const pendingPlatform=sessionStorage.getItem('td_pending_platform');
    if(pending){
      setInputSQL(pending);
      if(pendingPlatform)setPlatform(pendingPlatform);
      sessionStorage.removeItem('td_pending_sql');
      sessionStorage.removeItem('td_pending_platform');
      setStep(1); // Jump to Paste SQL step
    }
  },[]);

  const handleURLChange=(url)=>{
    setReportURL(url);setIframeErr(false);
    const detected=detectPlatformFromURL(url);
    if(detected&&!platform)setPlatform(detected);
    if(url&&!reportName){
      try{const u=new URL(url);const parts=u.pathname.split('/').filter(Boolean);setReportName(parts[parts.length-1]||u.hostname);}catch{}
    }
  };

  const handleFileUpload=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const sql=extractSQLFromFile(ev.target.result,file.name);
      setInputSQL(sql);toast(`File loaded: ${file.name}`,'success');
    };
    reader.readAsText(file);
  };

  const analyzeAndMap=()=>{
    if(!inputSQL.trim()){toast('Paste or upload SQL first','error');return;}
    const st=parseSQL(inputSQL);
    const mp=buildAutoMap(st,gcpProject,gcpDataset);
    setStructures(st);setMappings(mp);setStep(2);
    const overall=computeOverallScore(mp);
    if(overall<60)toast(`Low mapping confidence (${overall}%) — review highlighted items`,'error');
    else if(overall<80)toast(`Mapping confidence: ${overall}% — some items need review`,'info');
    else toast(`Mapping confidence: ${overall}% — ready to convert`,'success');
  };

  const autoFixLowConfidence=()=>{
    setMappings(m=>{
      const fix=(section)=>m[section].map(row=>{
        const sc=scoreMapping(row.source,row.target,section);
        if(sc.score<60){
          const normalized=gcpNormalize(row.source);
          return{...row,target:normalized||row.target};
        }
        return row;
      });
      return{...m,tables:fix('tables'),columns:fix('columns')};
    });
    toast('Low-confidence names normalized to GCP format','success');
  };

  const runConversion=()=>{
    const {output:syntaxOut,changes:sc}=translateSQL(inputSQL,platform);
    const {output:mappedOut,applied:mc}=applyMappings(syntaxOut,mappings,gcpProject,gcpDataset);
    const {fixed:fixedOut,errors,fixes}=validateAndFixSQL(mappedOut);

    // Build migration status header comment
    const tables=mappings?.tables||[];
    const confirmed=tables.filter(t=>t.gcpWave==='wave');
    const pending=tables.filter(t=>t.gcpWave==='original');
    const unknown=tables.filter(t=>!t.gcpWave||t.gcpWave==='unknown');
    const headerLines=[
      `-- ═══════════════════════════════════════════════════════`,
      `-- GCP BigQuery Converted SQL`,
      `-- Migration Wave: ${gcpMigVersion}  |  Converted: ${new Date().toLocaleDateString()}`,
      `-- ─────────────────────────────────────────────────────`,
    ];
    if(confirmed.length) headerLines.push(`-- ✅ Confirmed in GCP Wave ${gcpMigVersion} (${confirmed.length}): ${confirmed.map(t=>`\`${t.source}\``).join(', ')}`);
    if(pending.length)   headerLines.push(`-- ⚠  Original Source / Not yet in GCP Wave ${gcpMigVersion} (${pending.length}): ${pending.map(t=>`\`${t.source}\``).join(', ')}`);
    if(unknown.length)   headerLines.push(`-- ❓ Wave unknown — verify before deploying (${unknown.length}): ${unknown.map(t=>`\`${t.source}\``).join(', ')}`);
    headerLines.push(`-- ═══════════════════════════════════════════════════════`);

    // Append inline TODO comments after table refs not confirmed in GCP
    let annotated=fixedOut;
    for(const t of pending){
      const ref=`\`${gcpProject}.${gcpDataset}.${t.target}\``;
      const escaped=ref.replace(/[`.*+?^${}()|[\]\\]/g,'\\$&');
      annotated=annotated.replace(
        new RegExp(`(FROM|JOIN)\\s+(${escaped})\\b`,'gi'),
        `$1 $2 /* ⚠ NOT in GCP Wave ${gcpMigVersion} — confirm migration */`
      );
    }

    const finalOut=headerLines.join('\n')+'\n\n'+annotated;
    setConvertedSQL(finalOut);
    setSyntaxChanges(sc);setMappingChanges(mc);
    setValidationErrors(errors);setValidationFixes(fixes);
    setStep(3);
  };

  const updateMapping=(section,idx,field,val)=>{
    setMappings(prev=>{
      const copy={...prev,[section]:[...prev[section]]};
      copy[section][idx]={...copy[section][idx],[field]:val};
      return copy;
    });
  };
  const resetMapping=(section,idx)=>{
    setMappings(prev=>{
      const copy={...prev,[section]:[...prev[section]]};
      copy[section][idx]={...copy[section][idx],target:copy[section][idx].auto};
      return copy;
    });
  };

  // Cycle gcpWave: unknown → confirmed-in-wave → not-in-wave → unknown
  const toggleGcpWave=(section,idx)=>{
    setMappings(prev=>{
      const copy={...prev,[section]:[...prev[section]]};
      const cur=copy[section][idx].gcpWave||'unknown';
      const next=cur==='unknown'?'wave':cur==='wave'?'original':'unknown';
      copy[section][idx]={...copy[section][idx],gcpWave:next};
      return copy;
    });
  };
  const markAllWave=(wave)=>{
    setMappings(prev=>({
      ...prev,
      tables:prev.tables.map(r=>({...r,gcpWave:wave})),
      schemas:prev.schemas.map(r=>({...r,gcpWave:wave})),
      databases:prev.databases.map(r=>({...r,gcpWave:wave})),
    }));
    toast(`All tables marked as ${wave==='wave'?`GCP Wave ${gcpMigVersion}`:'Original Source'}`, 'success');
  };

  const saveSnapshot=(name)=>{
    const record={
      id:Date.now(),
      name:name||reportName||`Report ${new Date().toLocaleDateString()}`,
      platform,reportURL,originalSQL:inputSQL,
      convertedSQL,mappings,gcpProject,gcpDataset,
      syntaxChanges,mappingChanges,
      savedAt:new Date().toISOString(),
      status:convertedSQL?'converted':'draft',
    };
    setSavedReports(prev=>[record,...prev]);
    setShowPreviewModal(false);
    toast(`Saved: ${record.name}`,'success');
  };

  const downloadFile=(content,filename,mimeType='text/plain')=>{
    const blob=new Blob([content],{type:mimeType});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),500);
  };

  const saveCompletedConversion=()=>{
    // 1. Save snapshot to localStorage
    const snapName=reportName||`${PLATFORM_META[platform]?.name||platform} → BigQuery`;
    saveSnapshot(snapName);
    // 2. Download converted SQL to local folder
    const safeName=snapName.replace(/[^a-z0-9_\-]/gi,'_').replace(/_+/g,'_').toLowerCase();
    downloadFile(convertedSQL,`${safeName}_bigquery.sql`);
    toast(`Saved to library + downloading "${safeName}_bigquery.sql"`,'success');
  };

  const downloadSQLOnly=()=>{
    const safeName=(reportName||'converted').replace(/[^a-z0-9_\-]/gi,'_').replace(/_+/g,'_').toLowerCase();
    downloadFile(convertedSQL,`${safeName}_bigquery.sql`);
    toast(`Downloading "${safeName}_bigquery.sql"`,'success');
  };

  const downloadJSONExport=()=>{
    const payload=JSON.stringify({
      platform,reportName,reportURL,gcpProject,gcpDataset,
      gcpMigVersion,mappings,originalSQL:inputSQL,convertedSQL,
      syntaxChanges,mappingChanges,exportedAt:new Date().toISOString(),
    },null,2);
    const safeName=(reportName||'conversion').replace(/[^a-z0-9_\-]/gi,'_').replace(/_+/g,'_').toLowerCase();
    downloadFile(payload,`${safeName}_migration_export.json`,'application/json');
    toast('JSON export downloaded','success');
  };

  const resumeReport=(rec)=>{
    setPlatform(rec.platform||'');
    setReportURL(rec.reportURL||'');
    setReportName(rec.name||'');
    setInputSQL(rec.originalSQL||'');
    setConvertedSQL(rec.convertedSQL||'');
    setGcpProject(rec.gcpProject||settings.gcpProject||'');
    setGcpDataset(rec.gcpDataset||settings.bigqueryDataset||'');
    setSyntaxChanges(rec.syntaxChanges||[]);
    setMappingChanges(rec.mappingChanges||[]);
    if(rec.mappings)setMappings(rec.mappings);
    if(rec.originalSQL)setStructures(parseSQL(rec.originalSQL));
    setStep(rec.convertedSQL?3:rec.mappings?2:1);
    setShowSaved(false);
    toast(`Resumed: ${rec.name}`,'success');
  };

  const deleteReport=(id)=>{
    setSavedReports(prev=>prev.filter(r=>r.id!==id));
    toast('Report removed','info');
  };

  const importJSON=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.platform)setPlatform(d.platform);
        if(d.gcpProject)setGcpProject(d.gcpProject);
        if(d.gcpDataset)setGcpDataset(d.gcpDataset);
        if(d.mappings)setMappings(d.mappings);
        if(d.convertedSQL)setConvertedSQL(d.convertedSQL);
        toast('Mapping imported','success');setStep(2);
      }catch{toast('Invalid mapping file','error');}
    };
    reader.readAsText(file);
  };

  const reset=()=>{
    setStep(0);setPlatform('');setReportURL('');setInputSQL('');setReportName('');
    setStructures(null);setMappings(null);setConvertedSQL('');
    setSyntaxChanges([]);setMappingChanges([]);setIframeErr(false);
    setValidationErrors([]);setValidationFixes([]);
  };

  const warnings=syntaxChanges.filter(c=>
    c.toLowerCase().includes('warning')||c.toLowerCase().includes('rownum')||
    c.toLowerCase().includes('connect')||c.toLowerCase().includes('decode')||
    c.toLowerCase().includes('applysimple')
  );

  const STEPS=['Source & Setup','Paste Your SQL','Review Mapping','BigQuery SQL Output','Validate & Fix','Deploy to Report'];

  const deployInstructions={
    teradata:[
      {n:'1',t:'Download the Tableau workbook',d:'Right-click the workbook on Tableau Server → Download → Tableau Workbook (.twbx)'},
      {n:'2',t:'Replace Data Source',d:'In Tableau Desktop: Data → Replace Data Source → select the current Teradata source → choose Google BigQuery as replacement'},
      {n:'3',t:'Enter BigQuery credentials',d:`Select Service Account → sign in with Google account → GCP project: "${gcpProject||'<your-project>'}" → dataset: "${gcpDataset||'<your-dataset>'}"`},
      {n:'4',t:'Paste converted SQL',d:'For Custom SQL data sources: Data → Edit Data Source → click Custom SQL → replace with the converted BigQuery SQL above'},
      {n:'5',t:'Fix broken field references',d:'Check for orange ! marks in the Data pane → right-click → Replace References with matching BigQuery fields'},
      {n:'6',t:'Validate output matches original',d:'Compare key metrics — row counts, totals, date ranges — against the original Teradata-backed report'},
      {n:'7',t:'Publish',d:`Server → Publish Workbook → select project: "${settings.tableauProject||'<your-project>'}" → overwrite the existing workbook`},
    ],
    oracle:[
      {n:'1',t:'Open BI Publisher / OBIEE',d:'Navigate to the report in BI Publisher or OBIEE Answers'},
      {n:'2',t:'Edit the data model or SQL',d:'Open Data Model Editor → SQL Query section → replace with the converted BigQuery SQL above'},
      {n:'3',t:'Create BigQuery data source',d:'Administration → JDBC Data Sources → New → use Simba BigQuery JDBC driver → test connection'},
      {n:'4',t:'Map output columns',d:'Verify all column aliases match the original — aliases are fully preserved in the converted SQL'},
      {n:'5',t:'Preview & validate',d:'Run in Preview mode → compare every metric and aggregate against the original report numbers'},
    ],
    sqlserver:[

      {n:'2',t:'Create BigQuery data source',d:'Report Data pane → Data Sources → New → type: OLE DB / ODBC → use Google BigQuery ODBC driver (Simba)'},

      {n:'4',t:'Check report parameters',d:'Verify each parameter still matches — SSRS @param syntax works the same in BigQuery parameterized queries'},
      {n:'5',t:'Preview & publish',d:'Preview in Report Builder → verify all numbers → Deploy to SSRS Report Server → overwrite existing report'},

      {n:'2',t:'View report SQL',d:'Right-click the report → Edit → in Report Editor: View → Show SQL (SQL View Mode)'},
      {n:'3',t:'Create BigQuery database instance',d:'Administration → Database Instances → New → select Google BigQuery database type → configure JDBC connection'},
      {n:'4',t:'Update SQL objects and filters',d:'In SQL View, review each SQL block → paste the converted BigQuery SQL above for the primary dataset'},

      )}

      {/* Header */}
      <div className="mb-4 flex items-start justify-between gap-4">
        <div>
          <h1 className="text-2xl font-bold text-slate-900">Report Converter</h1>
          <p className="text-slate-500 text-sm mt-1">Convert any BI report to GCP BigQuery — same numbers, same columns, same look &amp; feel</p>
        </div>
        <div className="flex items-center gap-2 shrink-0">
          {savedReports&&savedReports.length>0&&(
            <button onClick={()=>setShowSaved(p=>!p)}
              className="flex items-center gap-1.5 px-3 py-2 text-xs font-semibold rounded-lg border border-slate-200 bg-white hover:border-cvs-red hover:text-cvs-red transition-colors">
              📂 Saved ({savedReports.length})
            </button>
          )}
          <Btn variant="secondary" small onClick={reset}>New Conversion</Btn>
          {setPage&&<Btn variant="ghost" small onClick={()=>setPage('dashboard')}>🏠 Home</Btn>}
        </div>
      </div>

      {/* Saved reports panel */}
      {showSaved&&savedReports&&savedReports.length>0&&(
        <div className="card p-4 mb-5 fade-in">
          <p className="text-xs font-bold text-slate-500 uppercase tracking-wide mb-3">Saved Report Conversions</p>
          <div className="space-y-2 max-h-60 overflow-y-auto">
            {savedReports.map(rec=>(
              <div key={rec.id} className="flex items-center gap-3 px-3 py-2.5 border border-slate-200 rounded-xl bg-slate-50 hover:border-cvs-red transition-all">
                <span className="text-lg shrink-0">{PLATFORM_META[rec.platform]?.icon||'📊'}</span>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-semibold text-slate-700 truncate">{rec.name}</p>
                  <p className="text-xs text-slate-400">{PLATFORM_META[rec.platform]?.name||rec.platform} · {new Date(rec.savedAt).toLocaleDateString()}</p>
                </div>
                <span className={`text-xs px-2 py-0.5 rounded-full font-semibold ${rec.status==='converted'?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'}`}>
                  {rec.status==='converted'?'Converted':'Draft'}
                </span>
                {rec.reportURL&&(
                  <a href={rec.reportURL} target="_blank" rel="noreferrer" className="text-xs text-cvs-red hover:underline shrink-0">View ↗</a>
                )}
                <button onClick={()=>resumeReport(rec)}
                  className="text-xs px-3 py-1 rounded-lg bg-cvs-red text-white hover:bg-red-800 transition-colors shrink-0">Resume</button>
                <button onClick={()=>deleteReport(rec.id)}
                  className="text-xs text-slate-400 hover:text-cvs-red shrink-0 px-1">✕</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Step progress */}
      <div className="flex items-center gap-0 mb-6">
        {STEPS.map((s,i)=>(
          <React.Fragment key={i}>
            <div className="flex items-center gap-2 cursor-pointer" onClick={()=>i<step&&setStep(i)}>
              <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold border-2 transition-all ${i<step?'bg-green-500 border-green-500 text-white':i===step?'bg-cvs-red border-cvs-red text-white':'bg-white border-slate-300 text-slate-400'}`}>
                {i<step?'✓':i+1}
              </div>
              <span className={`text-xs font-medium hidden md:block ${i===step?'text-cvs-red':i<step?'text-green-600':'text-slate-400'}`}>{s}</span>
            </div>
            {i<STEPS.length-1&&<div className={`flex-1 h-0.5 mx-2 ${i<step?'bg-green-400':'bg-slate-200'}`}/>}
          </React.Fragment>
        ))}
      </div>

      {/* ── STEP 0: Source & Config ── */}
      {step===0&&(
        <div className="space-y-5 fade-in max-w-3xl">
          <div>
            <p className="text-sm font-semibold text-slate-700 mb-3">Select source platform</p>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              {Object.entries(PLATFORM_META).map(([key,meta])=>(
                <button key={key} onClick={()=>setPlatform(key)}
                  className={`flex flex-col items-center gap-2 p-4 rounded-xl border-2 transition-all ${platform===key?'border-cvs-red bg-red-50':'border-slate-200 bg-white hover:border-slate-300'}`}>
                  <span className="text-3xl">{meta.icon}</span>
                  <span className="text-sm font-semibold text-slate-700">{meta.name}</span>
                  <span className="text-xs text-slate-400 text-center">{meta.hint}</span>
                </button>
              ))}
            </div>
          </div>

          <div className="card p-4 space-y-3">
            <p className="text-sm font-semibold text-slate-700">
              Report URL <span className="text-xs font-normal text-slate-400">— paste the link and preview the live report</span>
            </p>
            <div className="flex gap-2">
              <input type="url" value={reportURL} onChange={e=>handleURLChange(e.target.value)}
                placeholder="https://tableau.cvshealth.com/views/ClaimsDashboard"
                className="flex-1 px-3 py-2 text-sm border border-slate-200 rounded-lg focus:border-cvs-red bg-white"/>
              {reportURL&&(
                <button onClick={()=>setShowPreviewModal(true)}
                  className="px-4 py-2 text-sm font-semibold rounded-lg bg-cvs-red text-white hover:bg-red-800 transition-colors shrink-0">
                  👁 Preview Report
                </button>
              )}
            </div>
            <input value={reportName} onChange={e=>setReportName(e.target.value)}
              placeholder="Report name (e.g. Claims Dashboard Q4)"
              className="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:border-cvs-red bg-white"/>
            {reportURL&&(
              <div className="rounded-xl overflow-hidden border border-slate-200" style={{height:'280px'}}>
                {!iframeErr?(
                  <iframe src={reportURL} className="w-full h-full border-0"
                    sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
                    title="Report Preview" onError={()=>setIframeErr(true)}/>
                ):(
                  <div className="flex flex-col items-center justify-center h-full bg-slate-50 text-center p-4">
                    <p className="text-3xl mb-2">🔒</p>
                    <p className="text-sm font-semibold text-slate-600 mb-1">Blocked by BI server security policy</p>
                    <p className="text-xs text-slate-400 mb-3">Click "Preview Report" for the full-screen view with extraction instructions</p>
                    <button onClick={()=>setShowPreviewModal(true)}
                      className="btn-primary px-4 py-1.5 rounded-lg text-xs font-semibold text-white">
                      Open Full Preview
                    </button>
                  </div>
                )}
              </div>
            )}
          </div>

          <div className="grid grid-cols-2 gap-3">
            <Input label="GCP Project ID" value={gcpProject} onChange={setGcpProject} placeholder="e.g. anbc-prod-hcm-cm-de" required/>
            <Input label="BigQuery Dataset" value={gcpDataset} onChange={setGcpDataset} placeholder="e.g. claims_analytics_prod" required/>
          </div>
          <div className="flex gap-2">
            <Btn variant="primary" onClick={()=>setStep(1)} disabled={!platform||!gcpProject}>Next: Paste SQL →</Btn>
            {reportURL&&(
              <button onClick={()=>saveSnapshot(reportName||'Draft Report')}
                className="btn-secondary px-4 py-2 text-sm rounded-lg font-medium">💾 Save Draft</button>
            )}
          </div>
        </div>
      )}

      {/* ── STEP 1: Paste SQL ── */}
      {step===1&&(
        <div className="space-y-4 fade-in max-w-3xl">
          <div className="flex items-center justify-between flex-wrap gap-2">
            <div className="flex items-center gap-2">
              <span className="text-lg">{PLATFORM_META[platform]?.icon}</span>
              <p className="text-sm font-semibold text-slate-700">Paste {PLATFORM_META[platform]?.name} SQL</p>
            </div>
            <div className="flex gap-2">
              <input ref={fileRef} type="file" accept=".sql,.txt,.twb,.xml" className="hidden" onChange={handleFileUpload}/>
              <Btn variant="secondary" small onClick={()=>fileRef.current?.click()}>📁 Upload (.sql / .twb)</Btn>
              {reportURL&&(
                <button onClick={()=>setShowPreviewModal(true)}
                  className="btn-secondary text-xs px-3 py-1 rounded-lg font-medium">👁 View Report</button>
              )}
            </div>
          </div>
          <div className="relative">
            <textarea value={inputSQL} onChange={e=>setInputSQL(e.target.value)} rows={16}
              className="code w-full px-4 py-3 border-2 border-amber-300 rounded-xl bg-amber-50 text-slate-800 focus:border-amber-500 text-sm"
              placeholder={`Paste your ${PLATFORM_META[platform]?.name||'source'} SQL here.\n\nInclude all SELECT, FROM, JOIN, WHERE, GROUP BY clauses.\n\nTableau: Data → Edit Data Source → Custom SQL\nMicroStrategy: Report Editor → View → Show SQL\nSSRS: Dataset Properties → Query tab\nOBIEE: Criteria → Advanced → SQL Issued`}
              spellCheck={false}/>
            <span className="absolute bottom-3 right-4 text-xs text-slate-400">{inputSQL.length} chars</span>
          </div>
          <div className="flex gap-2">
            <Btn variant="secondary" onClick={()=>setStep(0)}>← Back</Btn>
            <Btn variant="primary" onClick={analyzeAndMap} disabled={!inputSQL.trim()}>Analyze &amp; Map Structures →</Btn>
          </div>
        </div>
      )}

      {/* ── STEP 2: Mapping grid ── */}
      {step===2&&mappings&&(
        <div className="space-y-4 fade-in">

          {/* ── GCP Migration Wave Banner ── */}
          {(()=>{
            const tables=mappings.tables||[];
            const confirmed=tables.filter(t=>t.gcpWave==='wave').length;
            const pending=tables.filter(t=>t.gcpWave==='original').length;
            const unk=tables.length-confirmed-pending;
            return(
              <div className="border-2 border-blue-400 rounded-2xl bg-gradient-to-r from-blue-50 to-indigo-50 p-4 shadow-sm">
                <div className="flex items-center gap-4 flex-wrap">
                  <div className="flex items-center gap-3 flex-1 min-w-0">
                    <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-lg shrink-0 shadow">🔷</div>
                    <div>
                      <p className="font-black text-blue-900 text-sm">GCP Migration Wave</p>
                      <p className="text-xs text-blue-600 mt-0.5">Mark each table/schema as confirmed in the selected wave. Wave data takes precedence; unmarked items fall back to the original source.</p>
                    </div>
                  </div>
                  {/* Wave selector */}
                  <div className="flex items-center gap-2 shrink-0">
                    <span className="text-xs font-bold text-blue-700 uppercase tracking-wide whitespace-nowrap">Active Wave:</span>
                    <select value={gcpMigVersion} onChange={e=>setGcpMigVersion(e.target.value)}
                      className="px-3 py-2 text-sm border-2 border-blue-400 rounded-xl bg-white font-black text-blue-900 focus:outline-none focus:border-blue-600 cursor-pointer shadow-sm">
                      <option value="1.0">Wave 1.0</option>
                      <option value="1.5">Wave 1.5</option>
                      <option value="2.0">Wave 2.0</option>
                      <option value="2.5">Wave 2.5</option>
                      <option value="3.0">Wave 3.0</option>
                    </select>
                  </div>
                  {/* Quick action buttons */}
                  <div className="flex items-center gap-1.5 shrink-0">
                    <button onClick={()=>markAllWave('wave')}
                      className="text-xs px-2.5 py-1.5 rounded-lg bg-blue-600 text-white font-semibold hover:bg-blue-700 transition-all shadow-sm">
                      ✅ All in Wave {gcpMigVersion}
                    </button>
                    <button onClick={()=>markAllWave('original')}
                      className="text-xs px-2.5 py-1.5 rounded-lg bg-amber-500 text-white font-semibold hover:bg-amber-600 transition-all shadow-sm">
                      📦 All Original
                    </button>
                  </div>
                </div>
                {/* Wave status summary */}
                <div className="flex items-center gap-4 mt-3 pt-3 border-t border-blue-200 flex-wrap">
                  <span className="text-xs font-semibold text-blue-700 uppercase tracking-wide">Wave Status:</span>
                  <div className="flex items-center gap-1.5 text-xs bg-blue-600 text-white px-3 py-1 rounded-full font-bold shadow-sm">
                    ✅ <span>{confirmed} confirmed in GCP Wave {gcpMigVersion}</span>
                  </div>
                  <div className="flex items-center gap-1.5 text-xs bg-amber-500 text-white px-3 py-1 rounded-full font-bold shadow-sm">
                    📦 <span>{pending} from original source</span>
                  </div>
                  {unk>0&&(
                    <div className="flex items-center gap-1.5 text-xs bg-slate-400 text-white px-3 py-1 rounded-full font-bold shadow-sm">
                      ❓ <span>{unk} wave unknown</span>
                    </div>
                  )}
                  <span className="text-xs text-blue-600 italic ml-auto">Click the wave badge on each row to toggle its migration status</span>
                </div>
              </div>
            );
          })()}

          {/* ── Overall Confidence Gauge ── */}
          {(()=>{
            const overall=computeOverallScore(mappings);
            const g=overall>=80
              ?{stroke:'#16a34a',border:'border-green-300',bg:'bg-green-50',text:'text-green-800',bar:'#16a34a',label:'Ready to Convert',icon:'✓'}
              :overall>=60
              ?{stroke:'#d97706',border:'border-amber-300',bg:'bg-amber-50',text:'text-amber-800',bar:'#d97706',label:'Review Recommended',icon:'⚠'}
              :{stroke:'#dc2626',border:'border-red-300',bg:'bg-red-50',text:'text-red-800',bar:'#dc2626',label:'Manual Review Required',icon:'✕'};
            const allRows=[
              ...mappings.databases.map(r=>({...r,section:'databases'})),
              ...mappings.schemas.map(r=>({...r,section:'schemas'})),
              ...mappings.tables.map(r=>({...r,section:'tables'})),
              ...mappings.columns.map(r=>({...r,section:'columns'})),
            ];
            const totalCount=allRows.length;
            const highCount=allRows.filter(r=>scoreMapping(r.source,r.target,r.section).score>=80).length;
            const lowItems=allRows.filter(r=>scoreMapping(r.source,r.target,r.section).score<60);
            return(
              <div className={`border-2 rounded-xl p-5 ${g.border} ${g.bg}`}>
                <div className="flex items-start gap-5">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-3 mb-2 flex-wrap">
                      <span className={`text-3xl font-black ${g.text}`}>{overall}%</span>
                      <div>
                        <p className={`font-bold text-base ${g.text}`}>Mapping Confidence</p>
                        <span className={`text-xs font-semibold px-2.5 py-0.5 rounded-full border ${g.border} ${g.text} ${g.bg}`}>
                          {g.icon} {g.label}
                        </span>
                      </div>
                    </div>
                    <div className="h-2.5 rounded-full bg-white/60 overflow-hidden mb-3 border border-white/40">
                      <div className="h-full rounded-full transition-all duration-700" style={{width:`${overall}%`,background:g.bar}}/>
                    </div>
                    <div className="flex gap-5 text-xs flex-wrap">
                      <span className={g.text}>📊 <strong>{totalCount}</strong> total mappings</span>
                      <span className="text-green-700">✓ <strong>{highCount}</strong> high confidence (≥80%)</span>
                      {lowItems.length>0&&<span className="text-red-700">⚠ <strong>{lowItems.length}</strong> need review (&lt;60%)</span>}
                    </div>
                    {lowItems.length>0&&(
                      <div className="mt-3 pt-3 border-t border-white/40">
                        <p className={`text-xs font-semibold ${g.text} mb-1.5`}>Low-confidence items — edit in the tables below:</p>
                        <div className="flex flex-wrap gap-1.5">
                          {lowItems.slice(0,10).map((item,i)=>{
                            const sc=scoreMapping(item.source,item.target,item.section);
                            return(
                              <span key={i} className={`text-xs font-mono px-2 py-0.5 rounded border ${g.border} bg-white/50 ${g.text} inline-flex items-center gap-1`}>
                                <span className="opacity-70">{sc.score}%</span>
                                <span>{item.source}</span>
                                <span className="opacity-50">→</span>
                                <span>{item.target||'?'}</span>
                              </span>
                            );
                          })}
                          {lowItems.length>10&&<span className={`text-xs ${g.text} opacity-60 self-center`}>+{lowItems.length-10} more</span>}
                        </div>
                      </div>
                    )}
                  </div>
                  {/* Circular gauge */}
                  <div className="shrink-0 relative w-24 h-24">
                    <svg viewBox="0 0 36 36" className="w-full h-full" style={{transform:'rotate(-90deg)'}}>
                      <circle cx="18" cy="18" r="15.9" fill="none" stroke="rgba(255,255,255,0.5)" strokeWidth="3.5"/>
                      <circle cx="18" cy="18" r="15.9" fill="none" stroke={g.stroke} strokeWidth="3.5"
                        strokeDasharray={`${overall} ${100-overall}`} strokeLinecap="round"
                        style={{transition:'stroke-dasharray 0.7s ease'}}/>
                    </svg>
                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                      <span className={`text-lg font-black leading-none ${g.text}`}>{overall}%</span>
                      <span className={`text-xs font-semibold ${g.text} opacity-70`}>match</span>
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* ── Toolbar ── */}
          <div className="flex items-center justify-between flex-wrap gap-2">
            <div className="flex items-center gap-2">
              <div className="bg-blue-50 border border-blue-200 rounded-xl px-4 py-2 text-sm text-blue-800">
                <strong>{structures?.tables.length||0}</strong> tables · <strong>{structures?.columns.length||0}</strong> columns detected
              </div>
              {structures?.cteNames?.length>0&&(
                <div className="bg-purple-50 border border-purple-200 rounded-xl px-3 py-2 text-xs text-purple-700">
                  {structures.cteNames.length} CTE{structures.cteNames.length>1?'s':''} excluded from mapping
                </div>
              )}
            </div>
            <div className="flex items-center gap-2">
              <button onClick={autoFixLowConfidence}
                className="flex items-center gap-1.5 px-3 py-2 text-xs font-semibold rounded-lg border border-amber-300 bg-amber-50 text-amber-700 hover:bg-amber-100 transition-colors">
                ⚡ Auto-fix Low Scores
              </button>
              <Btn variant="secondary" small onClick={()=>{setMappings(buildAutoMap(structures,gcpProject,gcpDataset));toast('Reset to auto','info');}}>↺ Reset All</Btn>
            </div>
          </div>

          {/* ── Mapping Tables ── */}
          {[
            {section:'databases',label:'Databases → GCP Project',colLabel:'Source Database / Server',targetLabel:'GCP Project ID'},
            {section:'schemas',  label:'Schemas → BigQuery Dataset',colLabel:'Source Schema / Database',targetLabel:'BigQuery Dataset'},
            {section:'tables',   label:'Tables',colLabel:'Source Table Name',targetLabel:'BigQuery Table Name'},
            {section:'columns',  label:'Columns & Field Aliases',colLabel:'Source Column / Field',targetLabel:'BigQuery Field Alias'},
          ].map(({section,label,colLabel,targetLabel})=>{
            const rows=mappings[section]||[];
            if(rows.length===0)return null;
            const sectionScores=rows.map(r=>scoreMapping(r.source,r.target,section).score);
            const avgScore=Math.round(sectionScores.reduce((a,b)=>a+b,0)/sectionScores.length);
            const lowCount=sectionScores.filter(s=>s<60).length;
            const gcpDB=mappings.databases[0]?.target||gcpProject;
            const gcpDS=mappings.schemas[0]?.target||gcpDataset;
            return(
              <div key={section} className="card overflow-hidden">
                <div className="bg-slate-50 px-4 py-2.5 border-b border-slate-200 flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <p className="text-xs font-bold text-slate-600 uppercase tracking-wide">{label}</p>
                    {lowCount>0&&(
                      <span className="text-xs text-orange-700 bg-orange-100 px-2 py-0.5 rounded-full font-medium">
                        ⚠ {lowCount} low score
                      </span>
                    )}
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="text-xs text-slate-400">{rows.length} item{rows.length!==1?'s':''}</span>
                    <span className={`text-xs font-bold px-2.5 py-0.5 rounded-full ${avgScore>=80?'bg-green-100 text-green-700':avgScore>=60?'bg-amber-100 text-amber-700':'bg-red-100 text-red-700'}`}>
                      avg {avgScore}%
                    </span>
                  </div>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-sm" style={{minWidth:'680px'}}>
                    <thead>
                      <tr className="border-b border-slate-100 bg-slate-50/50">
                        <th className="text-xs text-slate-400 font-semibold text-left px-4 py-2 w-[28%]">{colLabel}</th>
                        <th className="text-xs text-slate-400 font-semibold text-center px-3 py-2 w-[14%] whitespace-nowrap">Match Score</th>
                        <th className="text-xs text-slate-400 text-center px-2 py-2 w-[4%]">→</th>
                        <th className="text-xs text-slate-400 font-semibold text-left px-4 py-2 w-[25%]">{targetLabel}</th>
                        <th className="text-xs text-slate-400 font-semibold text-left px-4 py-2 w-[25%]">GCP Path Preview</th>
                        <th className="w-[4%]"/>
                      </tr>
                    </thead>
                    <tbody>
                      {rows.map((row,idx)=>{
                        const sc=scoreMapping(row.source,row.target,section);
                        const wave=row.gcpWave||'unknown';
                        const gcpPath=section==='tables'
                          ?`\`${gcpDB}.${gcpDS}.${row.target}\``
                          :section==='schemas'
                          ?`\`${gcpDB}.${row.target}.*\``
                          :section==='databases'
                          ?`\`${row.target}.*.*\``
                          :row.target;
                        const waveCfg=wave==='wave'
                          ?{bg:'bg-blue-600',text:'text-white',label:`✅ GCP Wave ${gcpMigVersion}`,row:'bg-blue-50/40',pathColor:'text-blue-700 font-semibold'}
                          :wave==='original'
                          ?{bg:'bg-amber-500',text:'text-white',label:'📦 Original Source',row:'bg-amber-50/40',pathColor:'text-amber-700'}
                          :{bg:'bg-slate-200',text:'text-slate-600',label:'❓ Unknown',row:'',pathColor:'text-slate-400'};
                        return(
                          <tr key={idx} className={`border-b border-slate-50 last:border-0 transition-colors ${waveCfg.row} ${sc.score<60&&wave!=='wave'?'bg-red-50/30 hover:bg-red-50/50':'hover:bg-slate-50/50'}`}>
                            <td className="px-4 py-2.5">
                              <div className="flex items-start gap-2">
                                {/* Wave toggle badge (only on tables/schemas/databases) */}
                                {section!=='columns'&&(
                                  <button onClick={()=>toggleGcpWave(section,idx)} title="Click to toggle GCP wave status"
                                    className={`shrink-0 text-xs px-2 py-0.5 rounded-full font-bold whitespace-nowrap transition-all mt-0.5 hover:opacity-80 ${waveCfg.bg} ${waveCfg.text}`}>
                                    {waveCfg.label}
                                  </button>
                                )}
                                <div className="min-w-0">
                                  <span className="font-mono text-xs text-slate-700 font-semibold">{row.source}</span>
                                  {row.alias&&row.alias!==row.source&&(
                                    <span className="text-slate-400 text-xs ml-2 font-mono">(alias: {row.alias})</span>
                                  )}
                                  {row.fullExpr&&row.fullExpr.length>row.source.length+5&&(
                                    <div className="text-slate-400 text-xs font-mono mt-0.5 truncate max-w-xs" title={row.fullExpr}>{row.fullExpr}</div>
                                  )}
                                </div>
                              </div>
                            </td>
                            <td className="text-center px-3 py-2.5">
                              <div className="flex flex-col items-center gap-0.5">
                                <span className={`text-sm font-black ${sc.color}`}>{sc.score}%</span>
                                <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${sc.bg} ${sc.color} whitespace-nowrap leading-none`}>{sc.label}</span>
                                <div className="w-12 h-1 rounded-full bg-slate-200 overflow-hidden mt-0.5">

                              </div>

                                <button onClick={()=>updateMapping(section,idx,'target',gcpNormalize(row.source))}

                              )}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          })}

          {!structures?.tables.length&&!structures?.columns.length&&(

              <textarea readOnly value={convertedSQL}

          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {syntaxChanges.length>0&&(
              <div className="card p-4">

                  {syntaxChanges.map((c,i)=>(
                    <div key={i} className="flex items-center gap-2 text-xs">

                      <span className="text-slate-700">{c}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {mappingChanges.length>0&&(
              <div className="card p-4">
                <p className="text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">Mappings Applied ({mappingChanges.length})</p>
                <div className="space-y-1 max-h-36 overflow-y-auto">
                  {mappingChanges.map((c,i)=>(
                    <div key={i} className="flex items-center gap-2 text-xs">
                      <span className="text-blue-500">→</span>
                      <span className="text-slate-700 font-mono">{c}</span>
                    </div>

                </div>
              </div>

          <div className="flex gap-2 flex-wrap items-center">

              🔌 Apply to Report

        </div>

      {/* ── STEP 4: Validate & Fix ── */}
      {step===4&&(
        <div className="space-y-4 fade-in max-w-2xl">
          {validationErrors.length>0?(
            <div className="card p-4 border-2 border-amber-400 bg-amber-50 space-y-2">

                <div>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">

                      <div className="shrink-0 w-8 h-8 rounded-lg bg-red-100 border border-red-300 flex items-center justify-center text-sm font-black text-red-700">{icon}</div>
                      <div>
                        <p className="text-xs font-black text-red-800 mb-0.5">{title}</p>
                        <p className="text-xs text-slate-600 leading-relaxed">{desc}</p>
                      </div>
                    </div>
                  ))}
                </div>
                {/* Service Account banner */}
                <div className="border border-yellow-400 rounded-xl bg-yellow-50 px-4 py-3 flex items-start gap-3">
                  <div className="w-8 h-8 rounded-lg bg-yellow-400 flex items-center justify-center text-base shrink-0 shadow-sm">🔑</div>
                  <div className="flex-1">
                    <p className="text-xs font-black text-yellow-900 mb-0.5 uppercase tracking-wide">Service Account Login Required</p>
                    <p className="text-xs text-yellow-800 leading-relaxed">When connecting your reporting tool (Tableau, MicroStrategy, SSRS, OBIEE, Power BI) to GCP BigQuery, you <strong>must authenticate using the designated GCP Service Account</strong> — not a personal Google account. Personal accounts do not have the required dataset-level IAM permissions. Obtain the service account credentials from your GCP admin before proceeding.</p>
                  </div>

                <div className="flex gap-2 flex-wrap pt-1">

                  </button>

                    <a href={reportURL} target="_blank" rel="noreferrer"
                      className="flex items-center gap-2 text-xs px-4 py-2 rounded-xl bg-amber-500 text-white font-bold hover:bg-amber-600 transition-all shadow">
                      👁 Open Original Report
                    </a>
                  )}
                  <div className="ml-auto flex items-center gap-1.5 text-xs text-red-600 font-semibold">
                    <span className="w-2 h-2 rounded-full bg-red-500 animate-pulse inline-block"/>
                    Manual validation required before production use
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
            {/* Left: converted SQL ready to inject */}

                  <div className="flex items-center gap-2">

                  </div>
                </div>

            <div className="space-y-3">
              <p className="text-sm font-bold text-slate-700">
                {PLATFORM_META[platform]?.icon} Deploy to {PLATFORM_META[platform]?.name||'Report'} — Step by Step
              </p>
              <div className="space-y-2">
                {deploySteps.map(({n,t,d})=>(
                  <div key={n} className="flex gap-3 card p-3 items-start">
                    <span className="shrink-0 w-6 h-6 rounded-full bg-cvs-red text-white text-xs flex items-center justify-center font-bold mt-0.5">{n}</span>
                    <div>
                      <p className="font-semibold text-slate-700 text-sm">{t}</p>
                      <p className="text-xs text-slate-400 mt-0.5">{d}</p>

                  </div>

              className="flex items-center gap-1.5 px-4 py-2 rounded-xl bg-green-600 text-white text-sm font-bold hover:bg-green-700 transition-all shadow-sm">
              💾 Save &amp; Download SQL
            </button>

            <button onClick={()=>setShowApplyModal(true)}
              className="flex items-center gap-2 px-4 py-2 rounded-xl bg-gradient-to-r from-cvs-red to-red-700 text-white text-sm font-bold shadow hover:shadow-lg transition-all">
              🔌 Apply to Report
            </button>
            <label className="cursor-pointer">
              <input type="file" accept=".json" className="hidden" onChange={importJSON}/>
              <span className="px-4 py-2 text-sm rounded-lg font-medium btn-secondary cursor-pointer">Import Mapping</span>
            </label>
            <Btn variant="secondary" onClick={reset}>New Conversion</Btn>
            {setPage&&<Btn variant="ghost" onClick={()=>setPage('dashboard')}>🏠 Home</Btn>}
          </div>
        </div>
      )}

      {/* Apply to Report Modal */}
      {showApplyModal&&(
        <ApplyToReportModal
          convertedSQL={convertedSQL}
          platform={platform}
          reportURL={reportURL}
          reportName={reportName}
          onClose={()=>setShowApplyModal(false)}
          toast={toast}/>
      )}

      {/* ── Before / After SQL Comparison Modal ── */}
      {showSQLCompare&&(
        <div className="fixed inset-0 bg-black bg-opacity-70 z-50 flex items-center justify-center p-3" onClick={e=>{if(e.target===e.currentTarget)setShowSQLCompare(false);}}>
          <div className="bg-white rounded-2xl w-full max-w-7xl max-h-[95vh] flex flex-col shadow-2xl overflow-hidden">
            {/* Header */}
            <div className="flex items-center justify-between px-5 py-4 border-b border-slate-200 bg-slate-50">
              <div>
                <h2 className="font-black text-slate-900 text-lg flex items-center gap-2">⊞ Before / After SQL Comparison
                  <span className="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 font-semibold">Verification Required</span>
                </h2>
                <p className="text-xs text-slate-500 mt-0.5">Compare original Teradata SQL (left) with the converted BigQuery SQL (right). Review every difference carefully.</p>
              </div>
              <button onClick={()=>setShowSQLCompare(false)} className="w-8 h-8 rounded-full flex items-center justify-center text-slate-400 hover:text-slate-700 hover:bg-slate-200 text-xl font-light transition-all">×</button>
            </div>
            {/* Side-by-side panels */}
            <div className="grid grid-cols-2 flex-1 overflow-hidden min-h-0">
              {/* Left: Original Teradata SQL */}
              <div className="flex flex-col border-r-2 border-amber-300 overflow-hidden">
                <div className="px-4 py-2.5 bg-amber-50 border-b border-amber-200 flex items-center gap-2 shrink-0">
                  <div className="w-3 h-3 rounded-full bg-amber-400"/>
                  <span className="text-xs font-black text-amber-800 uppercase tracking-wide">BEFORE — Original Teradata SQL</span>
                  <span className="ml-auto text-xs px-2 py-0.5 rounded-full bg-amber-200 text-amber-800 font-bold border border-amber-300">Teradata</span>
                </div>
                <textarea readOnly value={inputSQL||'(No original SQL — paste SQL in Step 1 to compare)'}
                  className="code flex-1 w-full px-4 py-3 text-xs bg-amber-50 text-slate-800 border-none resize-none focus:outline-none overflow-auto"
                  spellCheck={false}/>
              </div>
              {/* Right: Converted BigQuery SQL */}
              <div className="flex flex-col overflow-hidden">
                <div className="px-4 py-2.5 bg-green-50 border-b border-green-200 flex items-center gap-2 shrink-0">
                  <div className="w-3 h-3 rounded-full bg-green-500"/>
                  <span className="text-xs font-black text-green-800 uppercase tracking-wide">AFTER — BigQuery SQL</span>
                  <span className="ml-auto text-xs px-2 py-0.5 rounded-full bg-red-100 text-red-700 font-bold border border-red-200">⚠ Review Required</span>
                </div>
                <textarea readOnly value={convertedSQL||'(No converted SQL yet — complete conversion steps first)'}
                  className="code flex-1 w-full px-4 py-3 text-xs bg-green-50 text-slate-800 border-none resize-none focus:outline-none overflow-auto"
                  spellCheck={false}/>
              </div>
            </div>
            {/* Stats + action footer */}
            {(()=>{
              const aLines=(inputSQL||'').split('\n');
              const bLines=(convertedSQL||'').split('\n');
              const same=aLines.filter(l=>l.trim()&&bLines.some(b=>b.trim()===l.trim())).length;
              const removed=aLines.filter(l=>l.trim()&&!bLines.some(b=>b.trim()===l.trim())).length;
              const added=bLines.filter(l=>l.trim()&&!aLines.some(a=>a.trim()===l.trim())).length;
              return(
                <div className="px-5 py-3 border-t border-slate-200 flex items-center gap-4 bg-slate-50 flex-wrap shrink-0">
                  <span className="text-xs font-bold text-slate-500 uppercase tracking-wide">Diff Summary:</span>
                  <span className="text-xs font-black text-green-700 bg-green-100 px-2.5 py-1 rounded-full">+{added} lines added</span>
                  <span className="text-xs font-black text-red-600 bg-red-100 px-2.5 py-1 rounded-full">−{removed} lines changed/removed</span>
                  <span className="text-xs font-bold text-slate-500 bg-slate-100 px-2.5 py-1 rounded-full">{same} unchanged</span>
                  <div className="ml-auto flex gap-2">
                    {reportURL&&(
                      <a href={reportURL} target="_blank" rel="noreferrer"
                        className="text-xs px-3 py-1.5 rounded-lg bg-amber-500 text-white font-bold hover:bg-amber-600 transition-all">
                        👁 Original Report
                      </a>
                    )}
                    <button onClick={()=>{navigator.clipboard.writeText(convertedSQL);toast('BigQuery SQL copied','success');}}
                      className="text-xs px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-100 transition-all font-medium">
                      Copy BQ SQL
                    </button>
                    <button onClick={()=>setShowSQLCompare(false)}
                      className="text-xs px-4 py-1.5 rounded-lg bg-cvs-red text-white hover:bg-red-700 transition-all font-bold">
                      Close
                    </button>
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  APP ROOT
// ═══════════════════════════════════════════════════════════════════
function App(){
  const [state,setState]=useState(()=>initState());
  const [page,setPage]=useState('dashboard');
  const [sidebarCollapsed,setSidebarCollapsed]=useState(false);
  const [mobileOpen,setMobileOpen]=useState(false);
  const [toasts,setToasts]=useState([]);
  const [showShortcuts,setShowShortcuts]=useState(false);
  const [windowWidth,setWindowWidth]=useState(window.innerWidth);
  const [showWelcome,setShowWelcome]=useState(()=>!localStorage.getItem('cvs_welcome_seen'));

  useEffect(()=>{
    const handler=()=>setWindowWidth(window.innerWidth);
    window.addEventListener('resize',handler);
    return()=>window.removeEventListener('resize',handler);
  },[]);

  useEffect(()=>{
    if(windowWidth<1024&&windowWidth>=768)setSidebarCollapsed(true);
    else if(windowWidth>=1024)setSidebarCollapsed(false);
  },[windowWidth]);

  useEffect(()=>{
    const handler=(e)=>{
      if(e.ctrlKey&&e.key>='1'&&e.key<='6'){
        e.preventDefault();
        const pages=['dashboard','projects','settings','converter','translator','playbook'];
        setPage(pages[parseInt(e.key)-1]);
      }
      if(e.ctrlKey&&e.key==='k'){
        e.preventDefault();
        setPage('projects');
        setTimeout(()=>{const el=document.getElementById('project-search');if(el)el.focus();},100);
      }
      if(e.key==='Escape')setShowShortcuts(false);
      if(e.key==='?'&&!['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName))setShowShortcuts(true);
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[]);

  const toast=(message,type='info')=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,message,type}]);
  };
  const removeToast=(id)=>setToasts(p=>p.filter(t=>t.id!==id));

  const setProjects=useCallback(fn=>{
    setState(p=>{const next={...p,projects:typeof fn==='function'?fn(p.projects):fn};saveState(next);return next;});
  },[]);
  const setSettings=useCallback(s=>{
    setState(p=>{const next={...p,settings:s};saveState(next);return next;});
  },[]);
  const setSavedReports=useCallback(fn=>{
    setState(p=>{const next={...p,savedReports:typeof fn==='function'?fn(p.savedReports||[]):fn};saveState(next);return next;});
  },[]);
  const toggleDark=()=>{
    setState(p=>{const next={...p,darkMode:!p.darkMode};saveState(next);return next;});
  };

  const PAGE_META={
    dashboard: {title:'Dashboard',        sub:'Your migration overview at a glance'},
    projects:  {title:'My Projects',      sub:'Track and manage your active migrations'},
    converter: {title:'Report Converter', sub:'Convert Teradata SQL reports to BigQuery'},
    translator:{title:'SQL Translator',   sub:'Quick dialect translation — no project needed'},
    playbook:  {title:'Migration Playbook',sub:'Step-by-step CVS GCP migration guide'},
    settings:  {title:'Settings',         sub:'Configure your GCP project and app preferences'},
  };

  return(
    <div className={`flex h-screen overflow-hidden ${state.darkMode?'dark bg-slate-900':'bg-slate-100'}`}>
      {showWelcome&&(
        <WelcomeModal
          onClose={()=>{localStorage.setItem('cvs_welcome_seen','1');setShowWelcome(false);}}
          setPage={setPage}/>
      )}
      <Sidebar page={page} setPage={setPage} projects={state.projects}
        collapsed={sidebarCollapsed} setCollapsed={setSidebarCollapsed}
        mobileOpen={mobileOpen} setMobileOpen={setMobileOpen}/>

      <div className="flex-1 flex flex-col overflow-hidden">
        {/* Top bar */}
        <header className="bg-white border-b border-slate-200 px-4 py-3 flex items-center gap-3 shadow-sm shrink-0 no-print">
          {/* Hamburger (mobile) */}
          <button onClick={()=>setMobileOpen(true)}
            className="text-slate-500 hover:text-cvs-red text-xl" style={{display:windowWidth<768?'block':'none'}}>
            ☰
          </button>
          <div>
            <h2 className="font-bold text-slate-800 text-sm leading-tight">{(PAGE_META[page]||{}).title||page}</h2>
            <p className="text-xs text-slate-400 leading-tight hidden sm:block">{(PAGE_META[page]||{}).sub||''}</p>
          </div>
          <div className="flex-1"/>
          <div className="flex items-center gap-2 text-xs text-slate-400">
            <span className="w-2 h-2 rounded-full bg-green-400"/>
            <span>{state.settings.gcpProject||'GCP project not set'}</span>
          </div>
          {/* Dark mode toggle */}
          <button onClick={toggleDark}
            className="w-8 h-8 rounded-lg flex items-center justify-center text-slate-500 hover:text-cvs-red hover:bg-slate-100 transition-colors text-base"
            title={state.darkMode?'Light mode':'Dark mode'}>
            {state.darkMode?'☀':'☾'}
          </button>
          {/* Re-open welcome guide */}
          <button onClick={()=>setShowWelcome(true)}
            className="hidden sm:flex items-center gap-1 px-2.5 py-1.5 rounded-lg border border-slate-200 text-xs text-slate-500 hover:border-cvs-red hover:text-cvs-red hover:bg-red-50 transition-all"
            title="Show welcome guide">
            🧭 Guide
          </button>
          {/* Shortcuts help */}
          <button onClick={()=>setShowShortcuts(true)}
            className="w-7 h-7 rounded-full border border-slate-300 flex items-center justify-center text-xs font-bold text-slate-500 hover:border-cvs-red hover:text-cvs-red transition-colors"
            title="Keyboard shortcuts (?)">
            ?
          </button>
          {state.settings.email&&(
            <div className="flex items-center gap-1.5 bg-slate-100 rounded-full px-3 py-1">
              <span className="w-5 h-5 rounded-full bg-cvs-red text-white text-xs flex items-center justify-center font-bold">
                {state.settings.email[0].toUpperCase()}
              </span>
              <span className="text-xs text-slate-600 font-medium">{state.settings.email.split('@')[0]}</span>
            </div>
          )}
        </header>

        {/* Main content */}
        <main className="flex-1 overflow-y-auto pb-8">
          {page==='dashboard'&&<Dashboard projects={state.projects} setPage={setPage} settings={state.settings}/>}
          {page==='projects'&&<Projects projects={state.projects} setProjects={setProjects} toast={toast}/>}
          {page==='playbook'&&<Playbook projects={state.projects} setProjects={setProjects} settings={state.settings} setPage={setPage} toast={toast}/>}
          {page==='translator'&&<SQLTranslator settings={state.settings} toast={toast} setPage={setPage}/>}
          {page==='converter'&&<ReportConverter settings={state.settings} toast={toast} savedReports={state.savedReports||[]} setSavedReports={setSavedReports} setPage={setPage}/>}
          {page==='settings'&&<Settings settings={state.settings} setSettings={setSettings} toast={toast}/>}
        </main>
      </div>

      {/* Toasts */}
      <div className="fixed bottom-6 right-6 z-50 space-y-2 no-print">
        {toasts.map(t=><Toast key={t.id} {...t} onClose={()=>removeToast(t.id)}/>)}
      </div>

      {/* Footer — proprietary notice + contact */}
      <div className="fixed bottom-0 left-0 right-0 z-30 bg-slate-900 text-slate-400 text-xs flex items-center justify-between px-4 py-1.5 no-print select-none" style={{userSelect:'none'}}>
        <span>© {new Date().getFullYear()} CVS Health — Proprietary &amp; Confidential. All rights reserved.</span>
        <span className="flex items-center gap-1.5">
          <span className="text-slate-500">Built &amp; maintained by</span>
          <a href="mailto:Amor.Alfieri@cvshealth.com" className="text-slate-300 hover:text-white transition-colors font-medium">Amor.Alfieri@cvshealth.com</a>
        </span>
      </div>

      {/* Keyboard shortcuts modal */}
      {showShortcuts&&(
        <Modal title="Keyboard Shortcuts" onClose={()=>setShowShortcuts(false)}>
          <div className="space-y-2">
            {[
              ['Ctrl + 1','Dashboard'],
              ['Ctrl + 2','Projects'],
              ['Ctrl + 3','Settings'],
              ['Ctrl + 4','Report Converter'],
              ['Ctrl + 5','SQL Translator'],
              ['Ctrl + 6','Migration Playbook'],
              ['Ctrl + K','Jump to Projects search'],
              ['Escape','Close modals'],
              ['?','Show this help'],
            ].map(([key,desc])=>(
              <div key={key} className="flex items-center justify-between py-2 border-b border-slate-100 last:border-0">
                <span className="text-sm text-slate-600">{desc}</span>
                <kbd className="px-2 py-1 bg-slate-100 border border-slate-300 rounded text-xs font-mono text-slate-700">{key}</kbd>
              </div>
            ))}
          </div>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
