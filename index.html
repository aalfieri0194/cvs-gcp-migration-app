<script>
// ── Source protection ──────────────────────────────────────────────
(function(){
  // Block right-click context menu
  document.addEventListener('contextmenu',function(e){e.preventDefault();});
  // Block Ctrl+U (view-source), F12, Ctrl+Shift+I/J/C (devtools)
  document.addEventListener('keydown',function(e){
    if(e.key==='F12'){e.preventDefault();return;}
    if(e.ctrlKey&&e.key.toLowerCase()==='u'){e.preventDefault();return;}
    if(e.ctrlKey&&e.shiftKey&&['i','j','c'].includes(e.key.toLowerCase())){e.preventDefault();return;}
  });
  // Disable text selection on the entire page (except inputs/textareas)
  document.addEventListener('selectstart',function(e){
    if(!['INPUT','TEXTAREA'].includes(e.target.tagName))e.preventDefault();
  });
})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f1f5f9;color:#1e293b}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#CC0000;border-radius:4px}
.fade-in{animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.page-enter{animation:pageIn 0.25s ease-out}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.toast-enter{animation:toastIn 0.3s ease-out}
@keyframes toastIn{from{opacity:0;transform:translateX(100px)}to{opacity:1;transform:translateX(0)}}
.sidebar-item{transition:all .15s}
.sidebar-item.active{background:#CC0000;color:#fff}
.sidebar-item:not(.active):hover{background:#fee2e2;color:#CC0000}
textarea{resize:vertical}
.code{font-family:'Courier New',monospace;font-size:12.5px}
.tab-btn.active{border-bottom:2px solid #CC0000;color:#CC0000;font-weight:600}
.tab-btn:not(.active){color:#64748b}
.tab-btn:not(.active):hover{color:#CC0000}
.status-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:9999px}
.status-not-started{background:#f1f5f9;color:#64748b}
.status-in-progress{background:#fef3c7;color:#92400e}
.status-completed{background:#dcfce7;color:#166534}
.status-blocked{background:#fee2e2;color:#991b1b}
.diff-added{background:#dcfce7;color:#166534}
.diff-removed{background:#fee2e2;color:#991b1b;text-decoration:line-through}
.diff-changed{background:#fef9c3;color:#713f12}
input,select,textarea{outline:none}
input:focus,select:focus,textarea:focus{ring:2px solid #CC0000}
.ring-red:focus{box-shadow:0 0 0 2px #CC0000}
.btn-primary{background:#CC0000;color:#fff;border:none;cursor:pointer;transition:background .15s}
.btn-primary:hover{background:#900606}
.btn-secondary{background:#fff;color:#374151;border:1px solid #d1d5db;cursor:pointer;transition:all .15s}
.btn-secondary:hover{background:#f9fafb;border-color:#CC0000;color:#CC0000}
.btn-ghost{background:transparent;color:#64748b;border:none;cursor:pointer;transition:all .15s}
.btn-ghost:hover{color:#CC0000}
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:transform 0.2s,box-shadow 0.2s}
.card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.wizard-step.done{border-color:#16a34a;background:#f0fdf4}
.wizard-step.active{border-color:#CC0000;background:#fff7f7}
.wizard-step.pending{border-color:#e2e8f0;background:#fff}
.progress-fill{transition:width 0.8s ease-out}
/* Hamburger overlay */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:20}
.sidebar-mobile{position:fixed;left:0;top:0;bottom:0;z-index:25;width:220px;background:#fff;border-right:1px solid #e2e8f0;flex-direction:column;display:flex}

/* ── Dark mode ── */
.dark{background:#0f172a;color:#e2e8f0}
.dark body{background:#0f172a;color:#e2e8f0}
.dark .card{background:#1e293b;border-color:#334155}
.dark .card:hover{box-shadow:0 4px 12px rgba(0,0,0,.3)}
.dark input,.dark select,.dark textarea{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark .btn-secondary{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark .btn-secondary:hover{border-color:#CC0000;color:#CC0000}
.dark .btn-ghost{color:#94a3b8}
.dark .sidebar-item:not(.active):hover{background:#334155;color:#e2e8f0}
.dark aside{background:#0f172a;border-color:#334155}
.dark header{background:#1e293b;border-color:#334155}
.dark .bg-white{background:#1e293b}
.dark .bg-slate-50{background:#0f172a}
.dark .bg-slate-100{background:#1e293b}
.dark .bg-slate-900{background:#020617}
.dark .bg-slate-800{background:#0f172a}
.dark .border-slate-100{border-color:#334155}
.dark .border-slate-200{border-color:#334155}
.dark .text-slate-900{color:#f1f5f9}
.dark .text-slate-800{color:#e2e8f0}
.dark .text-slate-700{color:#cbd5e1}
.dark .text-slate-600{color:#94a3b8}
.dark .text-slate-500{color:#64748b}
.dark .text-slate-400{color:#475569}
.dark .status-not-started{background:#1e293b;color:#94a3b8}
.dark .tab-btn:not(.active){color:#94a3b8}
.dark .bg-amber-50{background:#451a03}
.dark .bg-blue-50{background:#0c1a2e}
.dark .bg-green-50{background:#052e16}
.dark .bg-red-50{background:#2d0a0a}

@media print{
  aside,header,.no-print{display:none!important}
  main{overflow:visible!important}
  .card{break-inside:avoid;box-shadow:none;border:1px solid #ccc}
}
@media(max-width:1024px){
  aside.expanded{width:56px}
  aside.expanded .sidebar-label{display:none}
  aside.expanded .sidebar-badge{display:none}
}
@media(max-width:768px){
  .mobile-hide{display:none!important}
  .sql-pane{flex-direction:column}
}
</style>
