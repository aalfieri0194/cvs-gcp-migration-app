<script>
// ── Source protection ──────────────────────────────────────────────
(function(){
  // Block right-click context menu
  document.addEventListener('contextmenu',function(e){e.preventDefault();});
  // Block Ctrl+U (view-source), F12, Ctrl+Shift+I/J/C (devtools)
  document.addEventListener('keydown',function(e){
    if(e.key==='F12'){e.preventDefault();return;}
    if(e.ctrlKey&&e.key.toLowerCase()==='u'){e.preventDefault();return;}
    if(e.ctrlKey&&e.shiftKey&&['i','j','c'].includes(e.key.toLowerCase())){e.preventDefault();return;}
  });
  // Disable text selection on the entire page (except inputs/textareas)
  document.addEventListener('selectstart',function(e){
    if(!['INPUT','TEXTAREA'].includes(e.target.tagName))e.preventDefault();
  });
})();

<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef}=React;

// ═══════════════════════════════════════════════════════════════════
//  SQL TRANSLATION ENGINE — MULTI-PLATFORM
// ═══════════════════════════════════════════════════════════════════
const TERADATA_RULES=[
  {id:'sel',    label:'SEL → SELECT',      pattern:/\bSEL\b/g,              replace:'SELECT',   category:'Keyword'},
  {id:'top',    label:'TOP N → LIMIT N',   pattern:/\bTOP\s+(\d+)\b/gi,    replace:(m,n)=>`/* LIMIT ${n} — move to end of query */`, category:'Pagination'},
  {id:'zeron',  label:'ZEROIFNULL → IFNULL(x,0)',  pattern:/\bZEROIFNULL\s*\(([^)]+)\)/gi, replace:(_,x)=>`IFNULL(${x}, 0)`, category:'Null Handling'},
  {id:'nullz',  label:'NULLIFZERO → NULLIF(x,0)',   pattern:/\bNULLIFZERO\s*\(([^)]+)\)/gi, replace:(_,x)=>`NULLIF(${x}, 0)`, category:'Null Handling'},
  {id:'byte',   label:'BYTEINT → INT64',   pattern:/\bBYTEINT\b/gi,         replace:'INT64',    category:'Data Type'},
  {id:'sint',   label:'SMALLINT → INT64',  pattern:/\bSMALLINT\b/gi,        replace:'INT64',    category:'Data Type'},
  {id:'int',    label:'INTEGER → INT64',   pattern:/\bINTEGER\b/gi,         replace:'INT64',    category:'Data Type'},
  {id:'bint',   label:'BIGINT → INT64',    pattern:/\bBIGINT\b/gi,          replace:'INT64',    category:'Data Type'},
  {id:'float4', label:'FLOAT → FLOAT64',   pattern:/\bFLOAT\b/gi,           replace:'FLOAT64',  category:'Data Type'},
  {id:'char2',  label:'CHARACTERS() → LENGTH()', pattern:/\bCHARACTERS\s*\(/gi, replace:'LENGTH(', category:'String Func'},
  {id:'index',  label:'INDEX() → STRPOS()', pattern:/\bINDEX\s*\(([^,]+),\s*([^)]+)\)/gi, replace:(_,s,sub)=>`STRPOS(${s}, ${sub})`, category:'String Func'},
  {id:'trim',   label:'TRIM(BOTH) → TRIM()', pattern:/\bTRIM\s*\(\s*BOTH\s+'([^']+)'\s+FROM\s+([^)]+)\)/gi, replace:(_,c,s)=>`TRIM(${s}, '${c}')`, category:'String Func'},
  {id:'now',    label:'{fn NOW()} → CURRENT_TIMESTAMP()', pattern:/\{fn\s+NOW\(\)\}/gi, replace:'CURRENT_TIMESTAMP()', category:'Date Func'},
  {id:'cdate',  label:'CURRENT_DATE → CURRENT_DATE()', pattern:/\bCURRENT_DATE\b(?!\s*\()/gi, replace:'CURRENT_DATE()', category:'Date Func'},
  {id:'ctime',  label:'CURRENT_TIME → CURRENT_TIME()', pattern:/\bCURRENT_TIME\b(?!\s*\()/gi, replace:'CURRENT_TIME()', category:'Date Func'},
  {id:'orepl',  label:'REPLACE → CREATE OR REPLACE', pattern:/\bOREPLACE\b/gi, replace:'OR REPLACE', category:'DDL'},
  {id:'vol',    label:'VOLATILE TABLE → TEMP TABLE', pattern:/\bVOLATILE\s+TABLE\b/gi, replace:'TEMP TABLE', category:'DDL'},
  {id:'compr',  label:'Remove COMPRESS',   pattern:/\bCOMPRESS\b\s*(\([^)]*\))?/gi, replace:'', category:'Cleanup'},
  {id:'fallb',  label:'Remove FALLBACK',   pattern:/\bFALLBACK\b/gi,        replace:'',         category:'Cleanup'},
  {id:'nopi',   label:'Remove NO PRIMARY INDEX', pattern:/\bNO\s+PRIMARY\s+INDEX\b/gi, replace:'', category:'Cleanup'},
  {id:'set',    label:'SET TABLE → TABLE', pattern:/\bSET\s+TABLE\b/gi,     replace:'TABLE',    category:'DDL'},
  {id:'sample', label:'SAMPLE N → TABLESAMPLE', pattern:/\bSAMPLE\s+(\d+)\b/gi, replace:'TABLESAMPLE SYSTEM (10 PERCENT)', category:'Sampling'},
  {id:'qual',   label:'QUALIFY warning',   pattern:/\bQUALIFY\b/gi,         replace:'/* QUALIFY: wrap in subquery with WHERE rn=1 */ QUALIFY', category:'Warning'},
];

const ORACLE_RULES=[
  {id:'nvl',       label:'NVL → IFNULL',           pattern:/\bNVL\s*\(/gi,                  replace:'IFNULL(',      category:'Null Handling'},
  {id:'nvl2',      label:'NVL2 → IF(IS NOT NULL)', pattern:/\bNVL2\s*\(([^,]+),([^,]+),([^)]+)\)/gi, replace:(_,x,a,b)=>`IF(${x.trim()} IS NOT NULL, ${a.trim()}, ${b.trim()})`, category:'Null Handling'},
  {id:'sysdate',   label:'SYSDATE → CURRENT_TIMESTAMP()', pattern:/\bSYSDATE\b/gi,           replace:'CURRENT_TIMESTAMP()', category:'Date Func'},
  {id:'todate',    label:'TO_DATE → PARSE_DATE',   pattern:/\bTO_DATE\s*\('([^']+)'\s*,\s*'([^']+)'\)/gi, replace:(_,s,f)=>`PARSE_DATE('${f}','${s}')`, category:'Date Func'},
  {id:'tochar',    label:'TO_CHAR → FORMAT_TIMESTAMP', pattern:/\bTO_CHAR\s*\(([^,]+),\s*'([^']+)'\)/gi, replace:(_,d,f)=>`FORMAT_TIMESTAMP('${f}', ${d.trim()})`, category:'Date Func'},
  {id:'ocdate',    label:'CURRENT_DATE → CURRENT_DATE()', pattern:/\bCURRENT_DATE\b(?!\s*\()/gi, replace:'CURRENT_DATE()', category:'Date Func'},
  {id:'octs',      label:'CURRENT_TIMESTAMP → CURRENT_TIMESTAMP()', pattern:/\bCURRENT_TIMESTAMP\b(?!\s*\()/gi, replace:'CURRENT_TIMESTAMP()', category:'Date Func'},
  {id:'number',    label:'NUMBER → NUMERIC',        pattern:/\bNUMBER\b(?!\s*\()/gi,          replace:'NUMERIC',      category:'Data Type'},
  {id:'numberpx',  label:'NUMBER(p,s) → NUMERIC',  pattern:/\bNUMBER\s*\(\s*(\d+)\s*,\s*(\d+)\s*\)/gi, replace:(_,p,s)=>`NUMERIC`, category:'Data Type'},
  {id:'varchar2',  label:'VARCHAR2 → STRING',       pattern:/\bVARCHAR2\s*(\([^)]*\))?/gi,   replace:'STRING',       category:'Data Type'},
  {id:'nvarchar2', label:'NVARCHAR2 → STRING',      pattern:/\bNVARCHAR2\s*(\([^)]*\))?/gi,  replace:'STRING',       category:'Data Type'},
  {id:'clob',      label:'CLOB → STRING',           pattern:/\bCLOB\b/gi,                    replace:'STRING',       category:'Data Type'},
  {id:'rownum',    label:'ROWNUM warning',           pattern:/\bROWNUM\b/gi,                  replace:'/* ROWNUM: use ROW_NUMBER() OVER() */ ROWNUM', category:'Warning'},
  {id:'decode',    label:'DECODE warning',           pattern:/\bDECODE\s*\(/gi,               replace:'/* DECODE: convert to CASE WHEN */ DECODE(', category:'Warning'},
  {id:'minus',     label:'MINUS → EXCEPT DISTINCT', pattern:/\bMINUS\b/gi,                   replace:'EXCEPT DISTINCT', category:'Set Op'},
  {id:'dual',      label:'FROM DUAL → (removed)',   pattern:/\bFROM\s+DUAL\b/gi,             replace:'',             category:'Cleanup'},
  {id:'ojoin',     label:'(+) outer join warning',  pattern:/\(\+\)/g,                       replace:'/* Convert (+) to explicit LEFT JOIN */', category:'Warning'},
  {id:'connby',    label:'CONNECT BY warning',       pattern:/\bCONNECT\s+BY\b/gi,           replace:'/* CONNECT BY: convert to recursive CTE */', category:'Warning'},
];

const SQLSERVER_RULES=[
  {id:'getdate',   label:'GETDATE() → CURRENT_TIMESTAMP()',  pattern:/\bGETDATE\s*\(\s*\)/gi,  replace:'CURRENT_TIMESTAMP()',  category:'Date Func'},
  {id:'getutc',    label:'GETUTCDATE() → CURRENT_TIMESTAMP()', pattern:/\bGETUTCDATE\s*\(\s*\)/gi, replace:'CURRENT_TIMESTAMP()', category:'Date Func'},
  {id:'isnull',    label:'ISNULL → IFNULL',           pattern:/\bISNULL\s*\(/gi,              replace:'IFNULL(',      category:'Null Handling'},
  {id:'nvarchar',  label:'NVARCHAR → STRING',          pattern:/\bNVARCHAR\s*(\([^)]*\))?/gi, replace:'STRING',       category:'Data Type'},
  {id:'ssvarchar', label:'VARCHAR → STRING',           pattern:/\bVARCHAR\s*(\([^)]*\))?/gi,  replace:'STRING',       category:'Data Type'},
  {id:'nchar',     label:'NCHAR → STRING',             pattern:/\bNCHAR\b/gi,                 replace:'STRING',       category:'Data Type'},
  {id:'bit',       label:'BIT → BOOL',                 pattern:/\bBIT\b/gi,                   replace:'BOOL',         category:'Data Type'},
  {id:'money',     label:'MONEY → NUMERIC',            pattern:/\bSMALLMONEY\b|\bMONEY\b/gi, replace:'NUMERIC',      category:'Data Type'},
  {id:'datetime',  label:'DATETIME → TIMESTAMP',       pattern:/\bDATETIME2\b|\bDATETIME\b/gi,replace:'TIMESTAMP',    category:'Data Type'},
  {id:'ssint',     label:'INT/BIGINT/SMALLINT/TINYINT → INT64', pattern:/\b(?:TINYINT|SMALLINT|BIGINT|INT)\b/gi, replace:'INT64', category:'Data Type'},
  {id:'ssfloat',   label:'FLOAT/REAL → FLOAT64',       pattern:/\bREAL\b|\bFLOAT\b/gi,       replace:'FLOAT64',      category:'Data Type'},
  {id:'identity',  label:'Remove IDENTITY',            pattern:/\bIDENTITY\s*\(\s*\d+\s*,\s*\d+\s*\)/gi, replace:'/* IDENTITY removed */', category:'Cleanup'},
  {id:'dateadd',   label:'DATEADD → DATE_ADD',         pattern:/\bDATEADD\s*\(\s*(\w+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)/gi, replace:(_,p,n,d)=>`DATE_ADD(${d.trim()}, INTERVAL ${n.trim()} ${p})`, category:'Date Func'},
  {id:'datediff',  label:'DATEDIFF → DATE_DIFF',       pattern:/\bDATEDIFF\s*\(\s*(\w+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)/gi, replace:(_,p,a,b)=>`DATE_DIFF(${b.trim()}, ${a.trim()}, ${p})`, category:'Date Func'},
  {id:'charindex', label:'CHARINDEX → STRPOS',         pattern:/\bCHARINDEX\s*\(\s*([^,]+)\s*,\s*([^)]+)\)/gi, replace:(_,sub,str)=>`STRPOS(${str.trim()}, ${sub.trim()})`, category:'String Func'},
  {id:'len',       label:'LEN → LENGTH',               pattern:/\bLEN\s*\(/gi,                replace:'LENGTH(',      category:'String Func'},
  {id:'convert',   label:'CONVERT → CAST',             pattern:/\bCONVERT\s*\(\s*([^,]+)\s*,\s*([^)]+)\)/gi, replace:(_,t,e)=>`CAST(${e.trim()} AS ${t.trim()})`, category:'Type Cast'},
  {id:'nolock',    label:'Remove WITH (NOLOCK)',        pattern:/\bWITH\s*\(\s*NOLOCK\s*\)/gi, replace:'',            category:'Cleanup'},
  {id:'sstop',     label:'TOP N → LIMIT N',            pattern:/\bTOP\s+(\d+)\b/gi,           replace:(m,n)=>`/* LIMIT ${n} — move to end */`, category:'Pagination'},
  {id:'temptab',   label:'#temp → TEMP TABLE',         pattern:/#(\w+)/g,                     replace:(_,n)=>`/* TEMP TABLE */ ${n}`, category:'DDL'},
  {id:'newid',     label:'NEWID() → GENERATE_UUID()',  pattern:/\bNEWID\s*\(\s*\)/gi,         replace:'GENERATE_UUID()', category:'Func'},
  {id:'isnumeric', label:'ISNUMERIC → SAFE_CAST check', pattern:/\bISNUMERIC\s*\(([^)]+)\)/gi, replace:(_,x)=>`(SAFE_CAST(${x} AS FLOAT64) IS NOT NULL)`, category:'Func'},
];

const MICROSTRATEGY_RULES=[
  {id:'applysimple', label:'ApplySimple warning', pattern:/\bApplySimple\s*\(/gi,      replace:'/* ApplySimple: review manually */ ApplySimple(', category:'Warning'},
  {id:'applycmp',    label:'ApplyComparison warning', pattern:/\bApplyComparison\b/gi, replace:'/* ApplyComparison: review manually */',           category:'Warning'},
  {id:'applyagg',    label:'ApplyAgg warning',    pattern:/\bApplyAgg\b/gi,            replace:'/* ApplyAgg: review manually */',                   category:'Warning'},
];

const PLATFORM_RULES={
  teradata:TERADATA_RULES,
  oracle:ORACLE_RULES,
  sqlserver:SQLSERVER_RULES,
  microstrategy:[...MICROSTRATEGY_RULES,...TERADATA_RULES],
};

const PLATFORM_META={
  teradata:     {icon:'🗄',name:'Teradata',      hint:'SEL, QUALIFY, VOLATILE TABLE'},
  oracle:       {icon:'🏛',name:'Oracle',         hint:'NVL, SYSDATE, DECODE, DUAL'},
  sqlserver:    {icon:'🪟',name:'SQL Server',     hint:'GETDATE(), ISNULL, NOLOCK, #temp'},
  microstrategy:{icon:'📊',name:'MicroStrategy',  hint:'ApplySimple, metric SQL, report SQL'},
};

const TRANSLATION_RULES=TERADATA_RULES;

function translateSQL(sql,platform='teradata'){
  if(!sql.trim())return{output:'',changes:[]};
  const rules=PLATFORM_RULES[platform]||TERADATA_RULES;
  let out=sql;
  const changes=[];
  for(const rule of rules){
    const before=out;
    out=out.replace(rule.pattern, typeof rule.replace==='function'?rule.replace:rule.replace);
    if(out!==before) changes.push(rule.label);
  }
  return{output:out,changes};
}

// ═══════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════
function timeAgo(dateStr){
  if(!dateStr)return'—';
  const seconds=Math.floor((Date.now()-new Date(dateStr))/1000);
  if(seconds<60)return'just now';
  if(seconds<3600)return`${Math.floor(seconds/60)}m ago`;
  if(seconds<86400)return`${Math.floor(seconds/3600)}h ago`;
  if(seconds<604800)return`${Math.floor(seconds/86400)}d ago`;
  return new Date(dateStr).toLocaleDateString();
}

function CountUp({target,duration=800}){
  const [val,setVal]=useState(0);
  useEffect(()=>{
    if(target===0){setVal(0);return;}
    let start=0;
    const step=timestamp=>{
      if(!start)start=timestamp;
      const progress=Math.min((timestamp-start)/duration,1);
      setVal(Math.floor(progress*target));
      if(progress<1)requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  },[target]);
  return val;
}

    'Completed':'status-completed','Blocked':'status-blocked'

  return <span className={`status-badge ${map[status]||'status-not-started'}`}>{status}</span>;
}

    <button type={type} disabled={disabled} onClick={onClick}

  );
}

// ═══════════════════════════════════════════════════════════════════
//  DONUT CHART
// ═══════════════════════════════════════════════════════════════════
function DonutChart({data}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(total===0)return(
    <div className="flex items-center justify-center w-32 h-32">
      <div className="w-32 h-32 rounded-full bg-slate-100 flex items-center justify-center">
        <span className="text-slate-400 text-sm">0</span>
      </div>
    </div>
  );
  const r=44,cx=60,cy=60,circumference=2*Math.PI*r;
  let offset=0;
  const segments=data.map(d=>{
    const pct=d.value/total;
    const dash=pct*circumference;
    const seg={...d,dash,offset};
    offset+=dash;
    return seg;
  });
  return(
    <div className="flex flex-col items-center gap-3">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#e2e8f0" strokeWidth="14"/>
        {segments.map((s,i)=>(
          <circle key={i} cx={cx} cy={cy} r={r} fill="none"
            stroke={s.color} strokeWidth="14"
            strokeDasharray={`${s.dash} ${circumference-s.dash}`}
            strokeDashoffset={-(s.offset-circumference/4)}
            style={{transition:'stroke-dasharray 0.8s ease'}}/>
        ))}
        <text x={cx} y={cy} textAnchor="middle" dy="0.35em" fontSize="18" fontWeight="bold" fill="#1e293b">{total}</text>
      </svg>
      <div className="flex flex-wrap gap-x-3 gap-y-1 justify-center">
        {data.map((d,i)=>(
          <div key={i} className="flex items-center gap-1.5 text-xs text-slate-600">
            <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{background:d.color}}/>
            <span>{d.label}: {d.value}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

        <div className="flex justify-between text-xs">

function ProjectDetail({project,onUpdate,onClose,toast}){
  const [tab,setTab]=useState('overview');
  const [notes,setNotes]=useState(project.notes||'');
  const [showReportModal,setShowReportModal]=useState(false);
  const [reportURLInput,setReportURLInput]=useState(project.reportURL||'');
  const [reportPlatformInput,setReportPlatformInput]=useState(project.reportPlatform||'');
  const [reportIframeErr,setReportIframeErr]=useState(false);
  const [gcpSQLInput,setGcpSQLInput]=useState('');
  const [versionLabelInput,setVersionLabelInput]=useState('');
  const [gcpURLInput,setGcpURLInput]=useState('');
  const [compareModal,setCompareModal]=useState(null); // {versionA, versionB}
  const [uploadIframeLoaded,setUploadIframeLoaded]=useState(false);
  const [uploadLoadTimer,setUploadLoadTimer]=useState(null);
  const [showUploadHint,setShowUploadHint]=useState(false);
  const stepsDone=Object.values(project.steps||{}).filter(Boolean).length;
  const toggleStep=useCallback((sid)=>{
    const steps={...project.steps,[sid]:!project.steps?.[sid]};
    const done=Object.values(steps).filter(Boolean).length;
    const status=done===0?'Not Started':done===MIGRATION_STEPS.length?'Completed':'In Progress';
    onUpdate({...project,steps,status,updatedAt:new Date().toISOString()});
  },[project,onUpdate]);
  const saveNotes=()=>onUpdate({...project,notes,updatedAt:new Date().toISOString()});
  const tdPath=`${project.teradataDb||'<db>'}.${project.teradataTable||'<table>'}`;
  const bqPath=`your-project.${project.bigqueryDataset||'<dataset>'}.${project.bigqueryTable||'<table>'}`;

  const saveReportVersion=(label,sql,gcpSQL)=>{
    const versions=project.reportVersions||[];
    const newVersion={
      id:Date.now(),label:label||`Version ${versions.length+1}`,
      reportURL:reportURLInput||project.reportURL,
      platform:reportPlatformInput||project.reportPlatform,
      sql:sql||'',gcpSQL:gcpSQL||'',
      savedAt:new Date().toISOString(),
    };
    onUpdate({...project,reportURL:reportURLInput||project.reportURL,reportPlatform:reportPlatformInput||project.reportPlatform,reportVersions:[newVersion,...versions],updatedAt:new Date().toISOString()});
    setShowReportModal(false);
  };

  const linkReport=()=>{
    onUpdate({...project,reportURL:reportURLInput,reportPlatform:reportPlatformInput,updatedAt:new Date().toISOString()});
  };

  const platform=PLATFORM_META[project.reportPlatform||reportPlatformInput];

  return(
    <div className="fixed inset-0 z-30 flex" style={{background:'rgba(0,0,0,.4)'}}>
      {/* Full-screen report preview modal */}

        <ReportPreviewModal
          url={project.reportURL||reportURLInput}
          platform={project.reportPlatform||reportPlatformInput}
          reportName={project.name}
          onSave={(name)=>saveReportVersion(name)}
          onClose={()=>setShowReportModal(false)}/>

      <div className="ml-auto w-full max-w-2xl bg-white h-full flex flex-col shadow-2xl fade-in">
        <div className="flex items-start gap-3 px-6 py-4 border-b border-slate-100 bg-slate-50">
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2 flex-wrap">
              <h2 className="font-bold text-slate-900 text-lg">{project.name}</h2>
              <Badge status={project.status}/>
              {project.reportURL&&<span className="text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 font-semibold">{platform?.icon} Report Linked</span>}
            </div>
            <p className="text-sm text-slate-400 mt-0.5">{project.workbook}</p>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-cvs-red text-2xl leading-none mt-1">×</button>
        </div>
        <div className="flex border-b border-slate-200 px-6">
          {['overview','phases','report','notes','config'].map(t=>(
            <button key={t} onClick={()=>setTab(t)}
              className={`tab-btn py-3 px-4 text-sm capitalize mr-1 ${tab===t?'active':''}`}>{t}</button>

        <div className="flex-1 overflow-y-auto px-6 py-5">

              <div className="card p-4 bg-slate-50">
                <div className="flex justify-between text-sm mb-2">
                  <span className="font-semibold text-slate-700">Overall Progress</span>

                <p className="text-xs text-blue-600">After converting SQL in the Report Converter, paste it here. This creates a new version without overriding the original.</p>
                <div className="grid grid-cols-2 gap-2">
                  <div>
                    <label className="block text-xs font-semibold text-slate-600 mb-1">Version Label</label>
                    <input type="text" value={versionLabelInput} onChange={e=>setVersionLabelInput(e.target.value)}
                      placeholder={`GCP Version ${new Date().toLocaleDateString()}`}
                      className="w-full px-3 py-2 text-xs border border-blue-200 rounded-lg bg-white focus:border-cvs-red"/>
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-slate-600 mb-1">Updated Report URL (optional)</label>
                    <input type="url" value={gcpURLInput} onChange={e=>setGcpURLInput(e.target.value)}
                      placeholder="https://tableau.../views/ClaimsDashboard_GCP"
                      className="w-full px-3 py-2 text-xs border border-blue-200 rounded-lg bg-white focus:border-cvs-red"/>
                  </div>
                </div>
                <textarea value={gcpSQLInput} onChange={e=>setGcpSQLInput(e.target.value)}
                  rows={5} placeholder="Paste converted BigQuery SQL here…"
                  className="code w-full px-3 py-2 text-xs border border-blue-200 rounded-lg bg-white focus:border-cvs-red"/>
                <div className="flex gap-2">
                  <button onClick={()=>{
                    if(!gcpSQLInput.trim()){toast&&toast('Paste the GCP BigQuery SQL first','error');return;}
                    const label=versionLabelInput.trim()||`GCP Version ${new Date().toLocaleDateString()}`;
                    const versions=project.reportVersions||[];
                    const origSQL=versions.find(v=>v.sql&&!v.gcpSQL)?.sql||versions[versions.length-1]?.sql||'';
                    const newVersion={
                      id:Date.now(),label,
                      reportURL:gcpURLInput||project.reportURL||reportURLInput,
                      platform:reportPlatformInput||project.reportPlatform,
                      sql:origSQL,gcpSQL:gcpSQLInput,
                      savedAt:new Date().toISOString(),type:'gcp',
                    };
                    onUpdate({...project,reportVersions:[newVersion,...versions],updatedAt:new Date().toISOString()});
                    setGcpSQLInput('');setVersionLabelInput('');setGcpURLInput('');
                    toast&&toast(`Saved "${label}" — original preserved`,'success');
                  }}
                    className="btn-primary text-xs px-4 py-2 rounded-lg font-semibold text-white">
                    💾 Save as New Version (preserves original)
                  </button>
                  {gcpSQLInput&&<button onClick={()=>setGcpSQLInput('')} className="text-xs px-3 py-2 rounded-lg bg-white border border-slate-200 text-slate-500 hover:text-cvs-red">Clear</button>}
                </div>
              </div>

              {/* ── Saved Versions ── */}
              <div>
                <div className="flex items-center justify-between mb-3">
                  <p className="text-xs font-bold text-slate-500 uppercase tracking-wide">
                    Saved Versions ({(project.reportVersions||[]).length})
                  </p>
                  {(project.reportVersions||[]).length>=2&&(
                    <button onClick={()=>{
                      const versions=project.reportVersions||[];
                      const orig=versions.find(v=>!v.gcpSQL)||versions[versions.length-1];
                      const gcp=versions.find(v=>v.gcpSQL)||versions[0];
                      setCompareModal({versionA:orig,versionB:gcp});
                    }}
                      className="text-xs px-3 py-1.5 rounded-lg bg-slate-800 text-white hover:bg-slate-700 font-semibold transition-colors">
                      ⊞ Compare Versions
                    </button>
                  )}
                </div>
                {(project.reportVersions||[]).length===0?(
                  <div className="card p-6 text-center bg-slate-50">
                    <p className="text-2xl mb-1">📷</p>
                    <p className="text-sm font-semibold text-slate-500">No saved versions yet</p>
                    <p className="text-xs text-slate-400 mt-1">Save a snapshot of the original report above, then paste the GCP SQL to create a new version for comparison.</p>
                  </div>
                ):(
                  <div className="space-y-2">
                    {(project.reportVersions||[]).map((v,i)=>{
                      const isGCP=!!(v.gcpSQL||v.type==='gcp');
                      const isOrig=!isGCP;
                      return(
                        <div key={v.id} className={`card p-3 border-l-4 ${isGCP?'border-l-green-500':'border-l-amber-400'}`}>
                          <div className="flex items-start gap-3">
                            <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold shrink-0 ${isGCP?'bg-green-500 text-white':'bg-amber-400 text-white'}`}>
                              {isGCP?'GCP':'V1'}
                            </div>
                            <div className="flex-1 min-w-0">
                              <div className="flex items-center gap-2 flex-wrap">
                                <p className="text-sm font-semibold text-slate-700 truncate">{v.label}</p>
                                {isGCP&&<span className="text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-700 font-semibold shrink-0">GCP BigQuery</span>}
                                {isOrig&&<span className="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 font-semibold shrink-0">Original</span>}
                              </div>
                              <p className="text-xs text-slate-400 mt-0.5">{PLATFORM_META[v.platform]?.name||v.platform||'—'} · {new Date(v.savedAt).toLocaleString()}</p>
                            </div>
                            <div className="flex gap-1.5 shrink-0 flex-wrap justify-end">
                              {v.reportURL&&(
                                <a href={v.reportURL} target="_blank" rel="noreferrer"
                                  className="text-xs px-2.5 py-1 rounded-lg border border-slate-200 text-slate-600 hover:border-cvs-red hover:text-cvs-red transition-colors">View ↗</a>
                              )}
                              {(v.gcpSQL||v.sql)&&(
                                <button onClick={()=>{
                                  const others=project.reportVersions.filter(o=>o.id!==v.id);
                                  const pair=others[0];
                                  if(pair)setCompareModal(isGCP?{versionA:pair,versionB:v}:{versionA:v,versionB:pair});
                                  else toast&&toast('Need at least 2 versions to compare','info');
                                }}
                                  className="text-xs px-2.5 py-1 rounded-lg border border-slate-200 text-slate-600 hover:border-slate-800 hover:text-slate-800 transition-colors">⊞ Compare</button>
                              )}
                              {v.gcpSQL&&(
                                <button onClick={()=>{sessionStorage.setItem('td_pending_sql',v.gcpSQL);toast&&toast('SQL loaded into converter','success');}}
                                  className="text-xs px-2.5 py-1 rounded-lg border border-blue-200 text-blue-600 hover:bg-blue-50 transition-colors">Load SQL</button>
                              )}
                            </div>
                          </div>
                          {(v.gcpSQL||v.sql)&&(
                            <div className="mt-2 pt-2 border-t border-slate-100">
                              <pre className="code text-xs text-slate-500 truncate max-h-12 overflow-hidden">{(v.gcpSQL||v.sql).substring(0,200)}</pre>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>

              {/* Compare modal */}
              {compareModal&&(
                <CompareReportsModal
                  project={project}
                  versionA={compareModal.versionA}
                  versionB={compareModal.versionB}
                  onClose={()=>setCompareModal(null)}/>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Side-by-Side Report Comparison Modal ────────────────────────────
function CompareReportsModal({project,versionA,versionB,onClose}){
  const [viewMode,setViewMode]=useState('live'); // live | sql | diff
  const [leftLoaded,setLeftLoaded]=useState(false);
  const [rightLoaded,setRightLoaded]=useState(false);
  const [leftBlocked,setLeftBlocked]=useState(false);
  const [rightBlocked,setRightBlocked]=useState(false);
  const metaA=PLATFORM_META[versionA?.platform]||{icon:'📊',name:'Original'};
  const metaB=PLATFORM_META[versionB?.platform]||{icon:'🔷',name:'GCP Updated'};
  const sqlA=versionA?.sql||'';
  const sqlB=versionB?.gcpSQL||versionB?.sql||'';
  const aLines=sqlA.split('\n');
  const bLines=sqlB.split('\n');
  const maxLines=Math.max(aLines.length,bLines.length);
  const diffStats=useMemo(()=>{
    const added=bLines.filter(l=>l.trim()&&!aLines.some(a=>a.trim()===l.trim())).length;
    const removed=aLines.filter(l=>l.trim()&&!bLines.some(b=>b.trim()===l.trim())).length;
    const same=aLines.filter(l=>l.trim()&&bLines.some(b=>b.trim()===l.trim())).length;
    return{added,removed,same,total:aLines.length};
  },[sqlA,sqlB]);
  const hasSQLData=!!(sqlA||sqlB);
  const hasURLData=!!(versionA?.reportURL||versionB?.reportURL);
  return(
    <div className="fixed inset-0 z-50 flex flex-col" style={{background:'#0f172a'}}>
      {/* Header */}
      <div className="flex items-center gap-4 px-5 py-3 bg-slate-800 border-b border-slate-700 shrink-0">
        <div className="flex-1 min-w-0">
          <h2 className="text-white font-bold text-base truncate">⊞ Side-by-Side Comparison — {project?.name}</h2>
          <p className="text-slate-400 text-xs mt-0.5">
            <span className="text-amber-400">{versionA?.label||'Original'}</span>
            <span className="text-slate-600 mx-2">vs</span>
            <span className="text-green-400">{versionB?.label||'GCP Updated'}</span>
          </p>
        </div>
        <div className="flex gap-1 shrink-0">
          {[{k:'live',label:'👁 Live',disabled:!hasURLData},{k:'sql',label:'📄 SQL',disabled:!hasSQLData},{k:'diff',label:'⊕ Diff',disabled:!hasSQLData}].map(({k,label,disabled})=>(
            <button key={k} onClick={()=>!disabled&&setViewMode(k)}
              disabled={disabled}
              className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${viewMode===k?'bg-cvs-red text-white':disabled?'bg-slate-800 text-slate-600 cursor-not-allowed':'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>
              {label}
            </button>
          ))}
        </div>
        <button onClick={onClose} className="text-slate-400 hover:text-white text-2xl leading-none ml-2">×</button>
      </div>

      {/* Main panels */}
      <div className="flex flex-1 overflow-hidden min-h-0">
        {/* LEFT — Before */}
        <div className="flex-1 flex flex-col min-w-0 border-r border-slate-700">
          <div className="flex items-center gap-2 px-4 py-2 bg-amber-950/60 border-b border-amber-800 shrink-0">
            <span className="text-xs font-black text-amber-400 uppercase tracking-widest">BEFORE</span>
            <span>{metaA.icon}</span>
            <span className="text-amber-200 text-xs font-semibold truncate">{versionA?.label||'Original Version'}</span>
            <div className="flex-1"/>
            {versionA?.reportURL&&<a href={versionA.reportURL} target="_blank" rel="noreferrer" className="text-amber-400 hover:text-white text-xs shrink-0">Open ↗</a>}
            {viewMode==='live'&&leftBlocked&&<span className="text-xs text-red-400 shrink-0">🔒 blocked</span>}
            {viewMode==='live'&&leftLoaded&&!leftBlocked&&<span className="text-xs text-green-400 shrink-0">● loaded</span>}
          </div>
          <div className="flex-1 overflow-hidden relative">
            {viewMode==='live'?(
              versionA?.reportURL&&!leftBlocked?(
                <iframe src={versionA.reportURL} className="w-full h-full border-0"
                  sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
                  title="Before Report"
                  onLoad={()=>setLeftLoaded(true)}
                  onError={()=>{setLeftBlocked(true);setLeftLoaded(false);}}/>
              ):(
                <div className="flex flex-col items-center justify-center h-full gap-3 text-center p-6">
                  {leftBlocked?(
                    <>
                      <span className="text-4xl">🔒</span>
                      <p className="text-slate-400 text-sm font-semibold">Blocked by BI server security policy</p>
                      {versionA?.reportURL&&<a href={versionA.reportURL} target="_blank" rel="noreferrer"><button className="px-4 py-2 bg-amber-700 text-white rounded-lg text-xs font-semibold">Open in New Tab ↗</button></a>}
                      <button onClick={()=>setViewMode('sql')} className="text-xs text-amber-400 hover:underline">Switch to SQL view →</button>
                    </>
                  ):(
                    <>
                      <span className="text-4xl opacity-30">📊</span>
                      <p className="text-slate-500 text-sm">No URL saved for this version</p>
                      <p className="text-slate-600 text-xs">Switch to SQL view to compare queries</p>
                    </>
                  )}
                </div>
              )
            ):viewMode==='sql'?(
              <textarea readOnly value={sqlA||'(no SQL saved for this version)'}
                className="code w-full h-full p-4 bg-slate-900 text-amber-200 text-xs border-0 resize-none focus:outline-none"/>
            ):(
              /* Diff left side — removed lines */
              <div className="h-full overflow-y-auto p-3 font-mono text-xs bg-slate-900">
                {Array.from({length:maxLines},(_,i)=>{
                  const line=aLines[i]||'';
                  const bLine=bLines[i]||'';
                  const changed=line.trim()!==bLine.trim();
                  const removed=changed&&line.trim()&&!bLines.some(b=>b.trim()===line.trim());
                  return(
                    <div key={i} className={`flex gap-2 leading-5 min-h-[20px] ${removed?'bg-red-900/40':''}`}>
                      <span className="text-slate-600 w-7 shrink-0 text-right select-none">{i+1}</span>
                      <span className={`flex-1 whitespace-pre-wrap break-all ${removed?'text-red-300':'text-slate-500'}`}>{line||' '}</span>
                      {removed&&<span className="text-red-500 shrink-0 text-xs font-bold">−</span>}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>

        {/* Center divider */}
        <div className="w-14 flex flex-col items-center justify-start bg-slate-800 shrink-0 pt-6 gap-3">
          <div className="text-2xl text-cvs-red font-bold">→</div>
          {hasSQLData&&(
            <div className="text-center space-y-2 mt-2">
              <div className="flex flex-col items-center gap-1">
                <span className="text-xs text-slate-500">same</span>
                <span className="text-sm font-bold text-slate-300">{diffStats.same}</span>
              </div>
              <div className="flex flex-col items-center gap-1">
                <span className="text-xs text-green-500">added</span>
                <span className="text-sm font-bold text-green-400">+{diffStats.added}</span>
              </div>
              <div className="flex flex-col items-center gap-1">
                <span className="text-xs text-red-500">removed</span>
                <span className="text-sm font-bold text-red-400">−{diffStats.removed}</span>
              </div>
            </div>
          )}
        </div>

        {/* RIGHT — After */}
        <div className="flex-1 flex flex-col min-w-0 border-l border-slate-700">
          <div className="flex items-center gap-2 px-4 py-2 bg-green-950/60 border-b border-green-800 shrink-0">
            <span className="text-xs font-black text-green-400 uppercase tracking-widest">AFTER</span>
            <span>{metaB.icon}</span>
            <span className="text-green-200 text-xs font-semibold truncate">{versionB?.label||'GCP Version'}</span>
            <div className="flex-1"/>
            {versionB?.reportURL&&<a href={versionB.reportURL} target="_blank" rel="noreferrer" className="text-green-400 hover:text-white text-xs shrink-0">Open ↗</a>}
            {viewMode==='live'&&rightBlocked&&<span className="text-xs text-red-400 shrink-0">🔒 blocked</span>}
            {viewMode==='live'&&rightLoaded&&!rightBlocked&&<span className="text-xs text-green-400 shrink-0">● loaded</span>}
          </div>
          <div className="flex-1 overflow-hidden relative">
            {viewMode==='live'?(
              versionB?.reportURL&&!rightBlocked?(
                <iframe src={versionB.reportURL} className="w-full h-full border-0"
                  sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
                  title="After Report"
                  onLoad={()=>setRightLoaded(true)}
                  onError={()=>{setRightBlocked(true);setRightLoaded(false);}}/>
              ):(
                <div className="flex flex-col items-center justify-center h-full gap-3 text-center p-6">
                  {rightBlocked?(
                    <>
                      <span className="text-4xl">🔒</span>
                      <p className="text-slate-400 text-sm font-semibold">Blocked by BI server security policy</p>
                      {versionB?.reportURL&&<a href={versionB.reportURL} target="_blank" rel="noreferrer"><button className="px-4 py-2 bg-green-700 text-white rounded-lg text-xs font-semibold">Open in New Tab ↗</button></a>}
                      <button onClick={()=>setViewMode('sql')} className="text-xs text-green-400 hover:underline">Switch to SQL view →</button>
                    </>
                  ):(
                    <>
                      <span className="text-4xl opacity-30">🔷</span>
                      <p className="text-slate-500 text-sm">No URL saved for this version</p>
                      <p className="text-slate-600 text-xs">Assign a report URL when saving the GCP version</p>
                    </>
                  )}
                </div>
              )
            ):viewMode==='sql'?(
              <textarea readOnly value={sqlB||'(no GCP SQL saved for this version)'}
                className="code w-full h-full p-4 bg-slate-900 text-green-200 text-xs border-0 resize-none focus:outline-none"/>
            ):(
              /* Diff right side — added lines */
              <div className="h-full overflow-y-auto p-3 font-mono text-xs bg-slate-900">
                {Array.from({length:maxLines},(_,i)=>{
                  const line=bLines[i]||'';
                  const aLine=aLines[i]||'';
                  const changed=line.trim()!==aLine.trim();
                  const added=changed&&line.trim()&&!aLines.some(a=>a.trim()===line.trim());
                  return(
                    <div key={i} className={`flex gap-2 leading-5 min-h-[20px] ${added?'bg-green-900/40':''}`}>
                      {added&&<span className="text-green-500 shrink-0 text-xs font-bold">+</span>}
                      <span className="text-slate-600 w-7 shrink-0 text-right select-none">{i+1}</span>
                      <span className={`flex-1 whitespace-pre-wrap break-all ${added?'text-green-300':changed&&!line.trim()?'text-slate-700':'text-slate-500'}`}>{line||' '}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Validation footer */}
      <div className="px-5 py-3 bg-slate-800 border-t border-slate-700 shrink-0">
        <div className="flex items-center gap-3 flex-wrap">
          <span className="text-xs font-bold text-slate-400 uppercase tracking-wide shrink-0">Validation</span>
          {hasSQLData&&(
            <>
              <span className="text-xs font-semibold px-2.5 py-1 rounded-full bg-slate-700 text-slate-300">{diffStats.same} lines unchanged</span>
              <span className="text-xs font-semibold px-2.5 py-1 rounded-full bg-green-900/60 text-green-300">+{diffStats.added} added</span>
              <span className="text-xs font-semibold px-2.5 py-1 rounded-full bg-red-900/60 text-red-300">−{diffStats.removed} removed</span>
              <span className={`text-xs font-semibold px-2.5 py-1 rounded-full ${diffStats.added===0&&diffStats.removed===0?'bg-green-900/60 text-green-300':'bg-amber-900/60 text-amber-300'}`}>
                {diffStats.added===0&&diffStats.removed===0?'✓ SQL identical':'⚠ SQL has changes'}
              </span>
            </>
          )}
          {!hasSQLData&&<span className="text-xs text-slate-500">No SQL saved — save SQL to each version to enable diff comparison</span>}
          <div className="flex-1"/>
          <div className="flex gap-2">
            {[{k:'live',l:'👁 Live'},{k:'sql',l:'📄 SQL'},{k:'diff',l:'⊕ Diff'}].filter(x=>x.k==='live'?hasURLData:hasSQLData).map(({k,l})=>(
              <button key={k} onClick={()=>setViewMode(k)}
                className={`text-xs px-3 py-1.5 rounded-lg font-semibold transition-all ${viewMode===k?'bg-cvs-red text-white':'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>{l}</button>
            ))}
            <button onClick={onClose} className="text-xs px-4 py-1.5 bg-slate-600 text-white rounded-lg font-semibold hover:bg-slate-500">Close</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Projects({projects,setProjects,toast}){
  const [showForm,setShowForm]=useState(false);
  const [editProject,setEditProject]=useState(null);
  const [detail,setDetail]=useState(null);
  const [filter,setFilter]=useState('All');
  const [search,setSearch]=useState('');
  const [platformFilter,setPlatformFilter]=useState('');
  const [reportFilter,setReportFilter]=useState(''); // '' | 'has_url' | 'has_gcp' | 'has_versions'
  const [previewProject,setPreviewProject]=useState(null);

  const filtered=projects.filter(p=>{
    const matchSearch=!search||p.name===search;
    const matchStatus=filter==='All'||p.status===filter;
    const matchPlatform=!platformFilter||p.reportPlatform===platformFilter;
    const matchReport=!reportFilter
      ||(reportFilter==='has_url'&&p.reportURL)
      ||(reportFilter==='has_gcp'&&(p.reportVersions||[]).some(v=>v.gcpSQL))
      ||(reportFilter==='has_versions'&&(p.reportVersions||[]).length>0);
    return matchSearch&&matchStatus&&matchPlatform&&matchReport;
  });

  const usedPlatforms=[...new Set(projects.map(p=>p.reportPlatform).filter(Boolean))];
  const hasActiveFilters=filter!=='All'||platformFilter||reportFilter||search;

  const createProject=(form)=>{
    const now=new Date().toISOString();
    const p={...form,id:Date.now().toString(),status:'Not Started',steps:{},notes:'',createdAt:now,updatedAt:now};
    setProjects(prev=>[p,...prev]);
    setShowForm(false);
    toast('Project created successfully','success');
  };
  const updateProject=(updated)=>{
    setProjects(prev=>prev.map(p=>p.id===updated.id?updated:p));
    if(detail?.id===updated.id)setDetail(updated);
  };
  const deleteProject=(id)=>{
    if(!confirm('Delete this project? This cannot be undone.'))return;
    setProjects(prev=>prev.filter(p=>p.id!==id));
    if(detail?.id===id)setDetail(null);
    toast('Project deleted','info');
  };
  const clearAllFilters=()=>{setFilter('All');setPlatformFilter('');setReportFilter('');setSearch('');};

  return(
    <div className="p-6 page-enter">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold text-slate-900">Migration Projects</h1>
          <p className="text-slate-500 text-sm mt-1">{projects.length} project{projects.length!==1?'s':''} · {filtered.length} shown</p>
        </div>
        <Btn variant="primary" onClick={()=>{setEditProject(null);setShowForm(true)}}>+ New Project</Btn>
      </div>

      {/* ── Search + filter bar ── */}
      <div className="flex items-start gap-3 mb-2 flex-wrap">
        {/* Project selector dropdown */}
        <div className="flex-1 min-w-[240px] relative">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none">🔍</span>
          <select value={search} onChange={e=>setSearch(e.target.value)}
            className="w-full pl-9 pr-8 py-2 text-sm border border-slate-200 rounded-xl focus:border-cvs-red bg-white focus:outline-none appearance-none cursor-pointer text-slate-700">
            <option value="">All Projects ({projects.length})</option>
            {projects.map(p=>(
              <option key={p.id} value={p.name}>{PLATFORM_META[p.reportPlatform]?.icon||'📁'} {p.name}{p.status?' — '+p.status:''}</option>
            ))}
          </select>
          <span className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-xs">▼</span>
        </div>
        {/* Status filter pills (quick access) */}
        <div className="flex gap-1 flex-wrap shrink-0">
          {['All','In Progress','Completed','Blocked'].map(f=>(
            <button key={f} onClick={()=>setFilter(f)}
              className={`text-xs px-3 py-2 rounded-xl font-medium transition-all ${filter===f?'bg-cvs-red text-white':'bg-white border border-slate-200 text-slate-600 hover:border-cvs-red hover:text-cvs-red'}`}>
              {f}
            </button>
          ))}
        </div>
      </div>

      {/* Active filter tags */}
      {hasActiveFilters&&(
        <div className="flex items-center gap-2 mb-4 flex-wrap">
          <span className="text-xs text-slate-500 font-semibold">Active filters:</span>
          {search&&<span className="text-xs px-2.5 py-1 rounded-full bg-slate-800 text-white flex items-center gap-1.5">📁 {search}<button onClick={()=>setSearch('')} className="hover:opacity-70">×</button></span>}
          {filter!=='All'&&<span className="text-xs px-2.5 py-1 rounded-full bg-cvs-red text-white flex items-center gap-1.5">Status: {filter}<button onMouseDown={()=>setFilter('All')} className="hover:opacity-70">×</button></span>}
          {platformFilter&&<span className="text-xs px-2.5 py-1 rounded-full bg-blue-100 text-blue-700 flex items-center gap-1.5">{PLATFORM_META[platformFilter]?.icon} {PLATFORM_META[platformFilter]?.name}<button onMouseDown={()=>setPlatformFilter('')} className="hover:opacity-70">×</button></span>}
          {reportFilter&&<span className="text-xs px-2.5 py-1 rounded-full bg-green-100 text-green-700 flex items-center gap-1.5">{reportFilter==='has_url'?'📊 Has URL':reportFilter==='has_gcp'?'🔷 Has GCP SQL':'📁 Has Versions'}<button onMouseDown={()=>setReportFilter('')} className="hover:opacity-70">×</button></span>}
          <button onClick={clearAllFilters} className="text-xs text-slate-400 hover:text-cvs-red underline">Clear all</button>
        </div>
      )}

      {filtered.length===0?(
        <div className="card p-12 text-center">
          <p className="text-4xl mb-3">🗂</p>
          <p className="font-semibold text-slate-600">{hasActiveFilters?'No projects match your filters':'No projects yet'}</p>
          {hasActiveFilters&&<button onClick={clearAllFilters} className="text-xs mt-2 text-cvs-red hover:underline">Clear filters</button>}
          {!hasActiveFilters&&<Btn variant="primary" className="mt-4" onClick={()=>setShowForm(true)}>Create First Project</Btn>}
        </div>
      ):(
        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
          {filtered.map(p=>(
            <ProjectCard key={p.id} project={p}
              onOpen={()=>setDetail(p)}
              onEdit={e=>{e.stopPropagation();setEditProject(p);setShowForm(true)}}
              onDelete={e=>{e.stopPropagation();deleteProject(p.id)}}
              onStatusChange={v=>updateProject({...p,status:v,updatedAt:new Date().toISOString()})}
              onPreviewReport={()=>setPreviewProject(p)}/>
          ))}
        </div>
      )}

      {previewProject&&previewProject.reportURL&&(
        <ReportPreviewModal
          url={previewProject.reportURL}
          platform={previewProject.reportPlatform}
          reportName={previewProject.name}
          onSave={(name)=>{
            const versions=previewProject.reportVersions||[];
            const newVersion={id:Date.now(),label:name||`Snapshot ${new Date().toLocaleDateString()}`,reportURL:previewProject.reportURL,platform:previewProject.reportPlatform,savedAt:new Date().toISOString()};
            updateProject({...previewProject,reportVersions:[newVersion,...versions],updatedAt:new Date().toISOString()});
            setPreviewProject(null);
            toast(`Saved snapshot for ${previewProject.name}`,'success');
          }}
          onClose={()=>setPreviewProject(null)}/>
      )}
      {showForm&&(
        <Modal title={editProject?'Edit Project':'New Migration Project'} onClose={()=>{setShowForm(false);setEditProject(null)}} wide>
          <ProjectForm initial={editProject} onSave={editProject?form=>{updateProject({...editProject,...form,updatedAt:new Date().toISOString()});setShowForm(false);setEditProject(null);toast('Project updated','success');}:createProject} onClose={()=>{setShowForm(false);setEditProject(null)}}/>
        </Modal>
      )}
      {detail&&<ProjectDetail project={detail} onUpdate={updateProject} onClose={()=>setDetail(null)} toast={toast}/>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  SQL TRANSLATOR — MULTI-PLATFORM
// ═══════════════════════════════════════════════════════════════════
const SQL_SAMPLES={
  teradata:{
    basic:`/* Basic SELECT */\nSEL TOP 100\n    member_id,\n    claim_date,\n    ZEROIFNULL(paid_amount) AS paid_amount,\n    CAST(age AS BYTEINT) AS age_int\nFROM claims_db.fact_claims\nWHERE claim_date >= CURRENT_DATE - 30\nORDER BY claim_date DESC`,
    volatile:`/* Volatile table example */\nCREATE VOLATILE TABLE temp_members AS (\n    SEL member_id, COUNT(*) AS claim_count\n    FROM claims_db.fact_claims\n    GROUP BY 1\n) WITH DATA PRIMARY INDEX (member_id);`,
    window:`/* Window function with QUALIFY */\nSEL\n    member_id,\n    claim_date,\n    paid_amount,\n    ROW_NUMBER() OVER (PARTITION BY member_id ORDER BY claim_date DESC) AS rn\nFROM claims_db.fact_claims\nQUALIFY rn = 1;`,
    strings:`/* String functions */\nSEL\n    member_id,\n    TRIM(BOTH ' ' FROM member_name) AS clean_name,\n    CHARACTERS(member_name) AS name_length,\n    INDEX(member_name, 'Smith') AS name_pos,\n    NULLIFZERO(paid_amount) AS amount\nFROM claims_db.dim_members;`,
  },
  oracle:{
    basic:`/* Oracle SELECT */\nSELECT member_id,\n  NVL(paid_amount, 0) AS paid_amount,\n  SYSDATE AS run_date\nFROM claims_owner.fact_claims\nWHERE claim_date >= CURRENT_DATE - 30\nORDER BY claim_date DESC`,
    decode:`/* DECODE example */\nSELECT member_id,\n  DECODE(status, 'A', 'Active', 'I', 'Inactive', 'Unknown') AS status_desc\nFROM claims_owner.dim_members`,
    plsql:`/* NVL2 and string functions */\nSELECT member_id,\n  NVL2(email, 'Has Email', 'No Email') AS email_status,\n  TO_CHAR(SYSDATE, 'YYYY-MM-DD') AS today\nFROM DUAL`,
  },
  sqlserver:{
    basic:`/* SQL Server SELECT */\nSELECT TOP 100 member_id,\n  ISNULL(paid_amount, 0) AS paid_amount,\n  GETDATE() AS run_date\nFROM dbo.fact_claims WITH (NOLOCK)\nWHERE claim_date >= DATEADD(day, -30, GETDATE())\nORDER BY claim_date DESC`,
    temp:`/* Temp table example */\nSELECT member_id, COUNT(*) AS claim_count\nINTO #temp_members\nFROM dbo.fact_claims\nGROUP BY member_id`,
    datemath:`/* Date functions */\nSELECT member_id,\n  DATEDIFF(day, enroll_date, GETDATE()) AS days_enrolled,\n  LEN(member_name) AS name_length,\n  CHARINDEX('Smith', member_name) AS smith_pos\nFROM dbo.dim_members`,
  },
  microstrategy:{
    applysimple:`/* MicroStrategy ApplySimple */\nSELECT member_id,\n  ApplySimple("ZEROIFNULL(#0)", paid_amount) AS paid_amount\nFROM claims_db.fact_claims`,
    passthrough:`/* MicroStrategy pass-through SQL */\nSEL member_id, claim_date,\n  ZEROIFNULL(paid_amount) AS paid_amount\nFROM claims_db.fact_claims\nQUALIFY ROW_NUMBER() OVER (PARTITION BY member_id ORDER BY claim_date DESC) = 1`,
  },
};

function SQLTranslator({settings,toast,setPage}){
  const [platform,setPlatform]=useState('teradata');
  const platformSamples=SQL_SAMPLES[platform]||{};
  const [input,setInput]=useState(Object.values(platformSamples)[0]||'');
  const [editedOutput,setEditedOutput]=useState('');
  const [outputEdited,setOutputEdited]=useState(false);
  const [tab,setTab]=useState('output');
  const [copied,setCopied]=useState(false);
  const [history,setHistory]=useState([]);
  const [showHistory,setShowHistory]=useState(false);
  const [showApplyModal,setShowApplyModal]=useState(false);
  const {output,changes}=useMemo(()=>translateSQL(input,platform),[input,platform]);

  // Sync auto-translated output unless user has manually edited
  useEffect(()=>{
    if(!outputEdited)setEditedOutput(output);
  },[output,outputEdited]);

  const handlePlatformChange=(p)=>{
    setPlatform(p);
    const samples=SQL_SAMPLES[p]||{};
    setInput(Object.values(samples)[0]||'');
    setOutputEdited(false);
  };

  const handleOutputEdit=(v)=>{
    setEditedOutput(v);
    setOutputEdited(true);
  };

  const resetOutputEdit=()=>{
    setEditedOutput(output);
    setOutputEdited(false);
    toast('Output reset to auto-translated version','info');
  };

  const copyOutput=()=>{
    navigator.clipboard.writeText(editedOutput).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1600);});
    toast('BigQuery SQL copied to clipboard','success');
  };

  const downloadSQL=()=>{
    const blob=new Blob([editedOutput],{type:'text/plain'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`bigquery_${Date.now()}.sql`;
    a.click();
    toast('SQL file downloaded','success');
  };

  const saveToHistory=()=>{
    if(!input.trim())return;
    const entry={id:Date.now(),platform,inputPreview:input.slice(0,80),output:editedOutput,changes:[...changes],ts:new Date().toLocaleString()};
    setHistory(h=>[entry,...h.slice(0,19)]);
    toast('Translation saved to history','success');
  };

  const sendToConverter=()=>{
    if(!editedOutput.trim()){toast('Nothing to send — translate some SQL first','error');return;}
    // Store in sessionStorage for ReportConverter to pick up
    sessionStorage.setItem('td_pending_sql',editedOutput);
    sessionStorage.setItem('td_pending_platform',platform);
    toast('SQL sent to Report Converter','success');
    if(setPage)setPage('converter');
  };

  const clearAll=()=>{
    setInput('');
    setEditedOutput('');
    setOutputEdited(false);
    toast('Cleared','info');
  };

  const loadFromHistory=(entry)=>{
    setInput(entry.inputPreview);
    setPlatform(entry.platform);
    setEditedOutput(entry.output);
    setOutputEdited(true);
    setShowHistory(false);
    toast('Loaded from history','success');
  };

  const activeRules=PLATFORM_RULES[platform]||TERADATA_RULES;
  const allCats=[...new Set(activeRules.map(r=>r.category))];
  const catColors={Keyword:'bg-purple-100 text-purple-700','Data Type':'bg-blue-100 text-blue-700','Null Handling':'bg-amber-100 text-amber-700','String Func':'bg-green-100 text-green-700','Date Func':'bg-teal-100 text-teal-700',DDL:'bg-indigo-100 text-indigo-700',Cleanup:'bg-slate-100 text-slate-600',Pagination:'bg-orange-100 text-orange-700',Warning:'bg-red-100 text-red-700',Sampling:'bg-cyan-100 text-cyan-700','Set Op':'bg-pink-100 text-pink-700','Type Cast':'bg-violet-100 text-violet-700',Func:'bg-sky-100 text-sky-700'};

  return(
    <div className="p-6 page-enter flex flex-col" style={{height:'calc(100vh - 56px)'}}>
      {/* Header */}
      <div className="mb-3 flex items-start justify-between gap-4">
        <div>
          <h1 className="text-2xl font-bold text-slate-900">SQL Translator</h1>
          <p className="text-slate-500 text-sm mt-1">Convert any source platform SQL to BigQuery Standard SQL in real-time — edit the output directly</p>
        </div>
        <div className="flex items-center gap-2 shrink-0">
          {history.length>0&&(
            <button onClick={()=>setShowHistory(p=>!p)}
              className="flex items-center gap-1.5 px-3 py-2 text-xs font-semibold rounded-lg border border-slate-200 bg-white hover:border-cvs-red hover:text-cvs-red transition-colors">
              🕐 History ({history.length})
            </button>
          )}
          <button onClick={clearAll}
            className="px-3 py-2 text-xs font-semibold rounded-lg border border-slate-200 bg-white text-slate-500 hover:border-red-400 hover:text-red-500 transition-colors">
            Clear All
          </button>
          {setPage&&(
            <button onClick={()=>setPage('dashboard')}
              className="px-3 py-2 text-xs font-semibold rounded-lg border border-slate-200 bg-white text-slate-500 hover:border-cvs-red hover:text-cvs-red transition-colors">
              🏠 Home
            </button>
          )}
        </div>
      </div>

      {/* History panel */}
      {showHistory&&history.length>0&&(
        <div className="card p-4 mb-3 fade-in">
          <p className="text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">Translation History (last {history.length})</p>
          <div className="space-y-1.5 max-h-48 overflow-y-auto">
            {history.map(entry=>(
              <button key={entry.id} onClick={()=>loadFromHistory(entry)}
                className="w-full text-left flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-red-50 border border-transparent hover:border-cvs-red transition-all group">
                <span className="text-lg shrink-0">{PLATFORM_META[entry.platform]?.icon||'📄'}</span>
                <div className="flex-1 min-w-0">
                  <div className="text-xs font-mono text-slate-700 truncate">{entry.inputPreview}…</div>
                  <div className="text-xs text-slate-400">{PLATFORM_META[entry.platform]?.name} → BigQuery · {entry.changes.length} changes · {entry.ts}</div>
                </div>
                <span className="text-xs text-cvs-red opacity-0 group-hover:opacity-100 shrink-0">Load →</span>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Platform selector */}
      <div className="flex gap-2 mb-3 flex-wrap">
        {Object.entries(PLATFORM_META).map(([key,meta])=>(
          <button key={key} onClick={()=>handlePlatformChange(key)}
            className={`flex items-center gap-2 px-3 py-2 rounded-xl border-2 text-sm font-medium transition-all ${platform===key?'border-cvs-red bg-red-50 text-cvs-red':'border-slate-200 bg-white text-slate-600 hover:border-cvs-red hover:text-cvs-red'}`}>
            <span>{meta.icon}</span>
            <span>{meta.name}</span>
            {platform===key&&<span className="text-xs text-slate-400 font-normal hidden sm:inline">— {meta.hint}</span>}
          </button>
        ))}
      </div>

      {/* Sample loader */}
      <div className="flex items-center gap-2 mb-3 flex-wrap">
        <span className="text-xs font-semibold text-slate-500">Sample:</span>
        {Object.entries(platformSamples).map(([k,v])=>(
          <button key={k} onClick={()=>{setInput(v);setOutputEdited(false);}}
            className="text-xs px-3 py-1.5 rounded-lg border border-slate-200 bg-white text-slate-600 hover:border-cvs-red hover:text-cvs-red capitalize transition-all">{k}</button>
        ))}
        <button onClick={clearAll}
          className="text-xs px-3 py-1.5 rounded-lg border border-slate-200 bg-white text-slate-400 hover:border-red-400 hover:text-red-500 transition-all ml-auto">Clear</button>
      </div>

      <div className="flex gap-4 flex-1 overflow-hidden min-h-0 sql-pane">
        {/* Input pane */}
        <div className="flex-1 flex flex-col min-w-0">
          <div className="flex items-center justify-between mb-2">
            <span className="text-xs font-bold text-slate-500 uppercase tracking-wide flex items-center gap-1.5">
              <span className="w-2.5 h-2.5 rounded-full bg-amber-400 inline-block"/>
              {PLATFORM_META[platform]?.name||'Source'} SQL (Input)
            </span>
            <span className="text-xs text-slate-400">{input.length} chars</span>
          </div>
          <div className="flex-1 relative">
            <textarea value={input} onChange={e=>{setInput(e.target.value);setOutputEdited(false);}}
              className="code absolute inset-0 w-full h-full px-4 py-3 border-2 border-amber-300 rounded-xl bg-amber-50 text-slate-800 focus:border-amber-500 text-sm"
              placeholder={`Paste your ${PLATFORM_META[platform]?.name||'source'} SQL here…`} spellCheck={false}/>
          </div>
        </div>

        {/* Arrow + badge */}
        <div className="flex flex-col items-center justify-center gap-2 shrink-0">
          <div className="text-2xl text-cvs-red font-bold">→</div>
          {changes.length>0&&<div className="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded-full">{changes.length} fix{changes.length!==1?'es':''}</div>}
          {outputEdited&&<div className="bg-amber-100 text-amber-700 text-xs font-bold px-2 py-1 rounded-full text-center">✏ edited</div>}
        </div>

        {/* Output pane */}
        <div className="flex-1 flex flex-col min-w-0">
          <div className="flex items-center justify-between mb-2">
            <div className="flex gap-3 items-center">
              {['output','changes','diff'].map(t=>(
                <button key={t} onClick={()=>setTab(t)}
                  className={`tab-btn text-xs uppercase tracking-wide py-0.5 ${tab===t?'active':''}`}>{t}</button>
              ))}
              {outputEdited&&(
                <button onClick={resetOutputEdit} className="text-xs text-amber-600 hover:text-amber-800 underline ml-2">reset</button>
              )}
            </div>
            <button onClick={copyOutput}
              className="text-xs px-3 py-1.5 rounded-lg border border-slate-200 bg-white text-slate-600 hover:bg-cvs-red hover:text-white hover:border-cvs-red transition-all">
              {copied?'✓ Copied!':'Copy SQL'}
            </button>
          </div>
          <div className="flex-1 relative">
            {tab==='output'?(
              <textarea value={editedOutput} onChange={e=>handleOutputEdit(e.target.value)}
                className={`code absolute inset-0 w-full h-full px-4 py-3 border-2 rounded-xl text-slate-800 text-sm focus:outline-none ${outputEdited?'border-amber-400 bg-amber-50':'border-green-300 bg-green-50 focus:border-green-500'}`}
                placeholder="BigQuery SQL will appear here — fully editable"
                spellCheck={false}/>
            ):tab==='changes'?(
              <div className="absolute inset-0 border-2 border-slate-200 rounded-xl bg-white overflow-y-auto p-4">
                {changes.length===0?(
                  <div className="text-center py-8 text-slate-400"><p className="text-3xl mb-2">✓</p><p className="text-sm">No translations needed</p></div>
                ):(
                  <div className="space-y-2">
                    <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3">{changes.length} transformation{changes.length!==1?'s':''} applied</p>
                    {changes.map((c,i)=>(
                      <div key={i} className="flex items-center gap-2 text-sm">
                        <span className="text-green-500 shrink-0">✓</span>
                        <span className="text-slate-700">{c}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ):(
              <div className="absolute inset-0 border-2 border-slate-200 rounded-xl bg-white overflow-y-auto p-4 font-mono text-xs">
                {input.split('\n').map((line,i)=>{
                  const outLine=(output.split('\n')[i]||'');
                  const changed=line.trim()!==outLine.trim()&&line.trim()!=='';
                  return(
                    <div key={i} className={`flex gap-2 leading-5 ${changed?'bg-green-50 rounded':''}`}>
                      <span className="text-slate-300 select-none w-7 shrink-0 text-right">{i+1}</span>
                      {changed?(
                        <div className="flex-1">
                          <div className="text-red-500 line-through opacity-70">{line}</div>
                          <div className="text-green-700">{outLine}</div>
                        </div>
                      ):(
                        <div className="flex-1 text-slate-600">{line||' '}</div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Action bar */}
      <div className="mt-3 flex flex-wrap gap-2 items-center">
        <button onClick={downloadSQL} disabled={!editedOutput.trim()}
          className="flex items-center gap-1.5 px-3 py-2 text-xs font-semibold rounded-lg border border-slate-200 bg-white text-slate-600 hover:border-cvs-red hover:text-cvs-red disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
          ⬇ Download .sql
        </button>
        <button onClick={saveToHistory} disabled={!input.trim()}
          className="flex items-center gap-1.5 px-3 py-2 text-xs font-semibold rounded-lg border border-slate-200 bg-white text-slate-600 hover:border-cvs-red hover:text-cvs-red disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
          🕐 Save to History
        </button>
        <button onClick={sendToConverter} disabled={!editedOutput.trim()}
          className="flex items-center gap-1.5 px-3 py-2 text-xs font-semibold rounded-lg border border-blue-300 bg-blue-50 text-blue-700 hover:bg-blue-100 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
          ⊕ Send to Report Converter
        </button>
        <button onClick={()=>setShowApplyModal(true)} disabled={!editedOutput.trim()}
          className="flex items-center gap-2 px-4 py-2 rounded-xl bg-gradient-to-r from-cvs-red to-red-700 text-white text-xs font-bold shadow hover:shadow-lg hover:from-red-700 hover:to-red-800 disabled:opacity-40 disabled:cursor-not-allowed transition-all">
          🔌 Apply to Report
        </button>
        <div className="flex-1"/>
        {setPage&&(
          <button onClick={()=>setPage('dashboard')}
            className="flex items-center gap-1.5 px-3 py-2 text-xs font-semibold rounded-lg border border-slate-200 bg-white text-slate-500 hover:border-cvs-red hover:text-cvs-red transition-colors">
            🏠 Home
          </button>
        )}
      </div>

      {/* Rules reference */}
      <div className="mt-2 card p-3">
        <p className="text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">
          {PLATFORM_META[platform]?.name} → BigQuery rules ({activeRules.length})
        </p>
        <div className="flex gap-2 flex-wrap">
          {allCats.map(cat=>{
            const count=activeRules.filter(r=>r.category===cat).length;
            return <span key={cat} className={`text-xs px-2.5 py-1 rounded-full font-medium ${catColors[cat]||'bg-slate-100 text-slate-600'}`}>{cat} ×{count}</span>;
          })}
        </div>
      </div>

      {/* Apply to Report Modal */}
      {showApplyModal&&(
        <ApplyToReportModal
          convertedSQL={editedOutput}
          platform={platform}
          reportURL=""
          reportName="SQL Translation"
          onClose={()=>setShowApplyModal(false)}
          toast={toast}/>
      )}
    </div>
  );
}

function PlaybookTaskCard({task,data,onChange,onToggle,completed,completedAt,phase1Data,setPage}){
  const set=(k,v)=>onChange({...data,[k]:v});

  const renderField=(f)=>{
    if(f.type==='checkbox'){
      return(
        <label key={f.key} className="flex items-center gap-2 cursor-pointer mt-2">
          <input type="checkbox" checked={!!data[f.key]} onChange={e=>set(f.key,e.target.checked)}
            className="w-4 h-4 accent-cvs-red"/>
          <span className="text-sm text-slate-700">{f.label}</span>
        </label>
      );
    }
    if(f.type==='textarea'){
      return(
        <div key={f.key} className="mt-2">
          {f.label&&<label className="block text-xs font-semibold text-slate-600 mb-1">{f.label}</label>}
          <textarea value={data[f.key]||''} onChange={e=>set(f.key,e.target.value)}
            placeholder={f.placeholder} rows={3}
            className="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg bg-white focus:border-cvs-red"/>
        </div>
      );
    }
    if(f.type==='select'){
      return(
        <div key={f.key} className="mt-2">
          {f.label&&<label className="block text-xs font-semibold text-slate-600 mb-1">{f.label}</label>}
          <select value={data[f.key]||f.options[0]} onChange={e=>set(f.key,e.target.value)}
            className="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg bg-white focus:border-cvs-red">
            {f.options.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        </div>
      );
    }
    return(
      <div key={f.key} className="mt-2">
        {f.label&&<label className="block text-xs font-semibold text-slate-600 mb-1">{f.label}</label>}
        <input type={f.type||'text'} value={data[f.key]||''} onChange={e=>set(f.key,e.target.value)}
          placeholder={f.placeholder}
          className="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg bg-white focus:border-cvs-red"/>
      </div>
    );
  };

  return(
    <div className={`card p-4 border-2 transition-all ${completed?'border-green-400 bg-green-50':'border-slate-200'}`}>
      {task.sectionHeader&&(
        <p className="text-xs font-bold text-cvs-red uppercase tracking-wide mb-3 -mt-1 pb-2 border-b border-slate-200">{task.sectionHeader}</p>
      )}
      <div className="flex items-start gap-3">
        <button onClick={onToggle}
          className={`shrink-0 w-6 h-6 rounded-full border-2 flex items-center justify-center text-xs font-bold transition-all mt-0.5 ${completed?'bg-green-500 border-green-500 text-white':'border-slate-300 hover:border-cvs-red hover:text-cvs-red text-slate-300'}`}>
          {completed?'✓':''}
        </button>
        <div className="flex-1">
          <p className={`font-semibold text-sm ${completed?'text-green-700 line-through':''}`}>{task.title}</p>
          {completed&&completedAt&&<p className="text-xs text-green-600 mt-0.5">Completed {timeAgo(completedAt)}</p>}

          {/* Validation variance */}
          {task.isValidation&&(
            <div className="mt-2 bg-amber-50 border border-amber-200 rounded-lg p-3 text-xs text-amber-800">
              <strong>Note:</strong> Variances may occur if data volumes differ or if source data was not real-time synchronized.
              {data.sourceRows&&data.targetRows&&(
                <div className="mt-2 font-mono font-bold">
                  Variance: {Math.abs(Math.round((Math.abs(Number(data.sourceRows)-Number(data.targetRows))/Number(data.sourceRows)*100)*100)/100)}%
                </div>
              )}
            </div>
          )}

          {/* Publish warning */}
          {task.isPublishWarning&&(
            <div className="mt-2 bg-red-50 border border-red-300 rounded-lg p-3 text-xs text-red-800">
              <strong>Do NOT override the original.</strong> Publish as a new asset.
            </div>
          )}

          {/* Fine-grain note */}
          {task.hasFineGrainNote&&(
            <div className="mt-2 bg-blue-50 border border-blue-200 rounded-lg p-3 text-xs text-blue-800">
              Column C in the excel document are the confidential fields.
            </div>
          )}

          {/* Joe note */}
          {task.hasJoeNote&&(
            <div className="mt-2 space-y-1">
              <div className="bg-blue-50 border border-blue-200 rounded-lg p-2 text-xs text-blue-800">Here is the standard process &gt;&gt; Tableau</div>
              <div className="bg-blue-50 border border-blue-200 rounded-lg p-2 text-xs text-blue-800">For the bulk tool requests process</div>
            </div>
          )}

          {/* Translator links */}
          {task.hasTranslatorLink&&(
            <div className="mt-2">
              <button onClick={()=>setPage('translator')}
                className="text-xs px-3 py-1.5 rounded-lg bg-cvs-red text-white font-medium hover:bg-red-700 transition-colors">
                Open SQL Translator →
              </button>
            </div>
          )}

          {/* GCP Mapping reference link */}
          {task.hasGCPMappingLink&&(
            <div className="mt-2">

                target="_blank" rel="noreferrer"
                className="inline-flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg bg-green-600 text-white font-medium hover:bg-green-700 transition-colors">

              <a href="https://aetnao365.sharepoint.com/sites/DAITools-BIandVisualization/SitePages/Tableau-EDP-Restricted.aspx"

                className="inline-flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg bg-red-700 text-white font-medium hover:bg-red-800 transition-colors">

          {/* GCP Data Access Instructions */}
          {task.hasGCPAccessInstructions&&(
            <div className="mt-3 rounded-xl overflow-hidden border-2 border-green-400">
              <div className="bg-green-600 px-4 py-2.5 flex items-center gap-2">
                <span className="text-xl">🔑</span>
                <div>
                  <p className="text-white font-black text-sm">How to Request GCP Data Access</p>
                  <p className="text-green-100 text-xs">BigQuery IAM permissions must be granted before you can run reports</p>
                </div>
              </div>
              <div className="bg-green-50 px-4 py-3 space-y-2.5 text-xs text-green-900">
                <div className="flex items-start gap-2">
                  <span className="w-5 h-5 rounded-full bg-green-600 text-white font-bold flex items-center justify-center shrink-0 text-xs">1</span>
                  <div>
                    <p className="font-bold">Identify the GCP project and BigQuery dataset</p>
                    <p className="text-green-700 mt-0.5">Example: <code className="bg-green-200 px-1 rounded">cvs-edp-prod:claims_analytics</code> — confirm this with your GCP data engineer before submitting the request.</p>
                  </div>
                </div>
                <div className="flex items-start gap-2">
                  <span className="w-5 h-5 rounded-full bg-green-600 text-white font-bold flex items-center justify-center shrink-0 text-xs">2</span>
                  <div>
                    <p className="font-bold">Submit an Access Request via ServiceNow</p>
                    <p className="text-green-700 mt-0.5">Open a ServiceNow ticket requesting the following IAM roles on the target BigQuery dataset/project:</p>
                    <ul className="mt-1.5 space-y-1 ml-2">
                      <li className="flex items-center gap-1.5"><span className="text-green-500">✓</span><code className="bg-green-200 px-1 rounded">roles/bigquery.dataViewer</code> — read access to tables/views</li>
                      <li className="flex items-center gap-1.5"><span className="text-green-500">✓</span><code className="bg-green-200 px-1 rounded">roles/bigquery.jobUser</code> — required to run queries</li>
                    </ul>
                    <div className="mt-2 bg-amber-50 border border-amber-300 rounded-lg p-2">
                      <p className="font-bold text-amber-800">Dev vs. Prod access:</p>
                      <p className="text-amber-700 mt-0.5"><strong>pdev (development):</strong> Personal/auth access is acceptable for billing, compute, and GCP console exploration.<br/>
                      <strong>Production:</strong> Access must be granted to the <strong>Service Account</strong> — not your personal GCP account. Any reporting tool (Tableau, Power BI, etc.) connecting to production BigQuery must authenticate via service account.</p>
                    </div>
                  </div>
                </div>
                <div className="flex items-start gap-2">
                  <span className="w-5 h-5 rounded-full bg-green-600 text-white font-bold flex items-center justify-center shrink-0 text-xs">3</span>
                  <div>
                    <p className="font-bold">CC the Cloud/GCP Engineering team</p>
                    <p className="text-green-700 mt-0.5">Include the GCP data engineer and your project's Cloud Engineering contact on the ticket so they can approve and provision access quickly.</p>
                  </div>
                </div>
                <div className="flex items-start gap-2">
                  <span className="w-5 h-5 rounded-full bg-green-600 text-white font-bold flex items-center justify-center shrink-0 text-xs">4</span>
                  <div>
                    <p className="font-bold">Verify access was granted</p>
                    <p className="text-green-700 mt-0.5">Once the ticket is resolved, test by running a simple <code className="bg-green-200 px-1 rounded">SELECT 1 FROM [dataset].[table] LIMIT 1</code> in the BigQuery console. Record the ticket number and granted date below.</p>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Service Account Instructions */}
          {task.hasServiceAccountInstructions&&(
            <div className="mt-3 rounded-xl overflow-hidden border-2 border-purple-400">
              <div className="bg-purple-700 px-4 py-2.5 flex items-center gap-2">
                <span className="text-xl">🤖</span>
                <div>
                  <p className="text-white font-black text-sm">GCP Access Types — Know When to Use Each</p>
                  <p className="text-purple-200 text-xs">Service Account required for production and all reporting tool connections</p>
                </div>
              </div>
              <div className="bg-purple-50 px-4 py-3 space-y-3 text-xs text-purple-900">

                {/* Access type comparison */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-2.5">
                  <div className="bg-blue-50 border border-blue-300 rounded-lg p-3">
                    <p className="font-black text-blue-800 text-xs mb-1">👤 Personal / Auth Access</p>
                    <p className="text-blue-700 font-semibold text-xs mb-1">Use for: Development &amp; Testing only</p>
                    <ul className="space-y-1 text-blue-700">
                      <li className="flex items-center gap-1.5"><span className="text-blue-400">✓</span>GCP Console exploration</li>
                      <li className="flex items-center gap-1.5"><span className="text-blue-400">✓</span>Non-prod (pdev) billing &amp; compute</li>
                      <li className="flex items-center gap-1.5"><span className="text-blue-400">✓</span>Ad-hoc BigQuery queries in dev</li>
                      <li className="flex items-center gap-1.5"><span className="text-red-500">✗</span>NOT for prod reporting tools</li>

                  </div>
                  <div className="bg-purple-100 border-2 border-purple-400 rounded-lg p-3">
                    <p className="font-black text-purple-800 text-xs mb-1">🤖 Service Account</p>
                    <p className="text-purple-700 font-semibold text-xs mb-1">Required for: Production</p>
